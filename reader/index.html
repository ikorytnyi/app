<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Читач тексту</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Themes ── */
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #23263a;
      --border: #2e3150;
      --accent: #5c6ef8;
      --accent-hover: #4a5ce6;
      --accent-glow: rgba(92, 110, 248, 0.25);
      --text: #e8eaf6;
      --text-muted: #7c82a8;
      --text-strong: #ffffff;
      --text-h2: #d8daf0;
      --text-h3: #c0c3de;
      --highlight: rgba(92, 110, 248, 0.18);
      --highlight-border: rgba(92, 110, 248, 0.45);
      --highlight-word: #f9e04b;
      --danger: #f05252;
      --success: #22c55e;
      --radius: 12px;
      --radius-sm: 8px;
    }

    :root[data-theme="light"] {
      --bg: #f4f4f8;
      --surface: #ffffff;
      --surface2: #ebebf3;
      --border: #d2d2e0;
      --accent: #4a5ce6;
      --accent-hover: #3a4cd6;
      --accent-glow: rgba(74, 92, 230, 0.2);
      --text: #1c1c2e;
      --text-muted: #5e5e80;
      --text-strong: #0a0a18;
      --text-h2: #242440;
      --text-h3: #363658;
      --highlight: rgba(74, 92, 230, 0.1);
      --highlight-border: rgba(74, 92, 230, 0.35);
      --highlight-word: #b45309;
      --danger: #dc2626;
      --success: #16a34a;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background .25s, color .25s;
    }

    /* ── Header ── */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      transition: background .25s, border-color .25s;
      flex-shrink: 0;
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* Theme toggle button */
    .btn-theme {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
      flex-shrink: 0;
    }

    .btn-theme:hover { border-color: var(--accent); color: var(--accent); }

    .btn-theme .icon-sun  { display: none; }
    .btn-theme .icon-moon { display: block; }
    [data-theme="light"] .btn-theme .icon-sun  { display: block; }
    [data-theme="light"] .btn-theme .icon-moon { display: none; }

    /* ── Layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      overflow: hidden;
      height: calc(100vh - 61px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: background .25s, border-color .25s;
    }

    .sidebar-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      transition: border-color .25s;
    }

    .sidebar-section h2 {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Drop zone */
    .drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .drop-zone svg { margin-bottom: 8px; opacity: .5; }
    .drop-zone p { font-size: 0.83rem; color: var(--text-muted); line-height: 1.5; }
    .drop-zone p strong { color: var(--text); }
    .drop-zone input[type="file"] { display: none; }

    .btn-paste {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
      width: 100%;
    }
    .btn-paste:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    /* Background presets */
    .bg-presets {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .bg-swatch {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      flex-shrink: 0;
    }
    .bg-swatch:hover  { border-color: var(--accent); transform: scale(1.1); }
    .bg-swatch.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

    .bg-color-input {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      padding: 0;
      cursor: pointer;
      background: none;
      transition: border-color .15s;
      flex-shrink: 0;
      overflow: hidden;
    }
    .bg-color-input:hover { border-color: var(--accent); }

    /* Controls */
    .controls { display: flex; flex-direction: column; gap: 12px; }

    .control-row { display: flex; flex-direction: column; gap: 5px; }

    .control-row label {
      font-size: 0.73rem;
      color: var(--text-muted);
      font-weight: 500;
      display: flex;
      justify-content: space-between;
    }

    .control-row input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .range-val {
      font-size: 0.73rem;
      color: var(--accent);
      font-weight: 600;
    }

    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 7px 10px;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      transition: background .25s, border-color .2s;
    }

    select:focus { border-color: var(--accent); }

    /* Playback buttons */
    .playback {
      padding: 16px 20px;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s, border-color .15s, color .15s;
      outline: none;
    }

    .btn:active { transform: scale(.96); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 16px var(--accent-glow); }
    .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }

    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:disabled { opacity: .4; cursor: not-allowed; }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      flex: 0;
      padding: 9px 11px;
    }
    .btn-danger:hover { border-color: var(--danger); background: rgba(240,82,82,.08); }

    /* Progress */
    .progress-wrap { padding: 0 20px 14px; }

    .progress-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: background .25s;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width .1s linear;
      width: 0%;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .timer-display {
      text-align: center;
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin-top: 6px;
      min-height: 1.1em;
    }

    .percent-display {
      text-align: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 4px;
      min-height: 1.1em;
    }

    /* Status */
    .status-bar {
      margin: 0 20px 14px;
      padding: 7px 11px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      font-size: 0.73rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      transition: background .25s;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-muted);
      transition: background .3s;
    }

    .status-dot.speaking { background: var(--success); animation: pulse 1s infinite; }
    .status-dot.paused   { background: #f59e0b; }
    .status-dot.error    { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .35; }
    }

    /* File info */
    .file-info {
      padding: 0 20px 14px;
      font-size: 0.73rem;
      color: var(--text-muted);
    }
    .file-info strong { color: var(--text); display: block; margin-bottom: 2px; }

    /* Auto-scroll indicator */
    .autoscroll-badge {
      margin: 0 20px 12px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.7rem;
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #f59e0b;
      display: none;
      align-items: center;
      gap: 6px;
    }
    .autoscroll-badge.visible { display: flex; }
    .autoscroll-badge svg { flex-shrink: 0; }

    /* ── Content panel ── */
    .content-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      transition: background .25s;
    }

    .content-toolbar {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
      transition: background .25s, border-color .25s;
    }

    .content-toolbar .toolbar-name {
      font-size: 0.75rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 4px;
    }

    .search-wrap > svg {
      position: absolute;
      left: 9px;
      opacity: .4;
      pointer-events: none;
    }

    .search-wrap input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px 5px 30px;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      width: 150px;
      transition: border-color .2s, background .25s;
    }

    .search-wrap input:focus { border-color: var(--accent); }

    .search-count {
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 36px;
      text-align: center;
    }

    .search-nav {
      display: none;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: border-color .15s, color .15s, background .15s;
    }
    .search-nav.visible { display: flex; }
    .search-nav:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    mark { background: rgba(249, 224, 75, 0.28); color: var(--highlight-word); border-radius: 2px; padding: 0 2px; }
    mark.active { background: rgba(249, 224, 75, 0.7); outline: 2px solid var(--highlight-word); border-radius: 2px; }

    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 40px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .content-body::-webkit-scrollbar { width: 6px; }
    .content-body::-webkit-scrollbar-track { background: transparent; }
    .content-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      gap: 16px;
      color: var(--text-muted);
      text-align: center;
    }
    .placeholder svg { opacity: .25; }
    .placeholder p { font-size: 0.9rem; line-height: 1.6; }

    #text-display {
      font-size: 1rem;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      width: 100%;
    }

    /* Sentence spans */
    #text-display .sentence {
      border-radius: 3px;
      transition: background .18s;
      cursor: pointer;
    }

    #text-display .sentence:hover { background: var(--highlight); }

    #text-display .sentence.active {
      background: var(--highlight);
      outline: 1px solid var(--highlight-border);
    }

    /* Markdown */
    #text-display .md-h1 { font-size: 1.75rem; font-weight: 700; display: block; margin: 1.2em 0 .4em; color: var(--text-strong); }
    #text-display .md-h2 { font-size: 1.35rem; font-weight: 600; display: block; margin: 1em 0 .3em; color: var(--text-h2); }
    #text-display .md-h3 { font-size: 1.1rem;  font-weight: 600; display: block; margin: .8em 0 .25em; color: var(--text-h3); }
    #text-display .md-bold { font-weight: 700; color: var(--text-strong); }
    #text-display .md-italic { font-style: italic; }
    #text-display .md-code { font-family: 'Consolas', monospace; background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-size: .87em; transition: background .25s; }
    #text-display .md-hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; display: block; transition: border-color .25s; }
    #text-display .md-blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text-muted); margin: .4em 0; display: block; }
    #text-display .md-li { padding-left: 1.4em; position: relative; display: block; margin: .1em 0; }
    #text-display .md-li::before { content: '•'; position: absolute; left: .4em; color: var(--accent); }


    /* ── Reading (fullscreen) mode ── */
    body.reading-mode header { display: none; }
    body.reading-mode .sidebar { display: none; }
    body.reading-mode main {
      grid-template-columns: 1fr;
      height: 100vh;
    }
    body.reading-mode .content-toolbar { display: none; }
    body.reading-mode .content-body { padding: 56px 80px; }

    /* Floating reading controls */
    .reading-bar {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      z-index: 200;
      user-select: none;
    }
    .reading-bar.visible { opacity: 1; pointer-events: all; }

    .reading-bar .rb-timer {
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
      color: var(--text-muted);
      padding: 0 6px;
      min-width: 130px;
      text-align: center;
    }

    .rb-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .rb-btn:hover { background: var(--surface2); color: var(--accent); }
    .rb-btn.rb-play { background: var(--accent); color: #fff; width: 36px; height: 36px; }
    .rb-btn.rb-play:hover { background: var(--accent-hover); }
    .rb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    /* Fullscreen toggle button in toolbar */
    .btn-reading {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .2s, color .2s;
    }
    .btn-reading:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 48vh; overflow-y: auto; }
      .content-body { padding: 20px; }
      #text-display { font-size: 0.95rem; }
      .header-sub { display: none; }
    }
  </style>
</head>
<body>

<header>
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
  </svg>
  <h1>Читач тексту</h1>
  <span class="header-sub">Web Speech API · Ukrainian TTS</span>
  <button class="btn-theme" id="btn-theme" title="Перемкнути тему">
    <!-- moon = shown in dark mode, sun = shown in light mode -->
    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
</header>

<main>
  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- File upload -->
    <div class="sidebar-section">
      <h2>Файл</h2>
      <label class="drop-zone" id="drop-zone">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p><strong>Перетягніть файл</strong><br/>або натисніть для вибору<br/><small>.txt · .md · .pdf · .html</small></p>
        <input type="file" id="file-input" accept=".txt,.md,.pdf,.html,.htm,text/plain,text/markdown,application/pdf,text/html" />
      </label>
      <button class="btn-paste" id="btn-paste" title="Вставити текст з буфера обміну (Ctrl+V)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        </svg>
        Вставити з буфера
      </button>
    </div>

    <!-- File info -->
    <div class="file-info" id="file-info" style="display:none">
      <strong id="file-name">—</strong>
      <span id="file-meta"></span>
    </div>

    <!-- Display controls -->
    <div class="sidebar-section">
      <h2>Відображення</h2>
      <div class="controls">
        <div class="control-row">

<div class="reading-bar" id="reading-bar">
  <button class="rb-btn" id="rb-prev" title="Попереднє">

<script>
(() => {
  'use strict';

  // ── State ──
  const state = {
    sentences: [],
    currentIdx: 0,
    speaking: false,
    paused: false,
    utterance: null,
    voices: [],
    fileName: '',
    rawText: '',
    searchTerm: '',
    autoScroll: true,       // disabled when user manually scrolls
    programmaticScroll: false, // true during our own scrollIntoView
    sentenceStartTime: 0,
    totalSpokenMs: 0,
    totalSpokenChars: 0,
    totalMs: 0,
  };

  // ── Elements ──
  const $ = id => document.getElementById(id);
  const dropZone         = $('drop-zone');
  const fileInput        = $('file-input');
  const voiceSel         = $('voice-select');
  const rateSlider       = $('rate');
  const pitchSlider      = $('pitch');
  const volSlider        = $('volume');
  const rateVal          = $('rate-val');
  const pitchVal         = $('pitch-val');
  const volumeVal        = $('volume-val');
  const pauseSlider      = $('pause');
  const pauseVal         = $('pause-val');
  const fontsizeSlider   = $('fontsize');
  const fontsizeVal      = $('fontsize-val');
  const textwSlider      = $('textwidth');
  const textwVal         = $('textwidth-val');
  const btnPlay          = $('btn-play');
  const btnStop          = $('btn-stop');
  const btnPrev          = $('btn-prev');
  const btnNext          = $('btn-next');
  const iconPlay         = $('icon-play');
  const iconPause        = $('icon-pause');
  const playLabel        = $('btn-play-label');
  const statusDot        = $('status-dot');
  const statusText       = $('status-text');
  const progFill         = $('progress-fill');
  const progCur          = $('prog-cur');
  const progTotal        = $('prog-total');
  const textDisplay      = $('text-display');
  const placeholder      = $('placeholder');
  const fileInfo         = $('file-info');
  const fileNameEl       = $('file-name');
  const fileMeta         = $('file-meta');
  const toolbarName      = $('toolbar-name');
  const searchInput      = $('search-input');
  const searchCount      = $('search-count');
  const searchPrevBtn    = $('search-prev');
  const searchNextBtn    = $('search-next');
  const contentBody      = $('content-body');
  const progressBg       = $('progress-bg');
  const autoscrollBadge  = $('autoscroll-badge');
  const timeLeftEl       = $('time-left');
  const btnTheme         = $('btn-theme');
  const btnReading       = $('btn-reading');
  const readingBar       = $('reading-bar');
  const rbPrev           = $('rb-prev');
  const rbPlay           = $('rb-play');
  const rbNext           = $('rb-next');
  const rbExit           = $('rb-exit');
  const rbTimer          = $('rb-timer');
  const rbIconPlay       = $('rb-icon-play');
  const rbIconPause      = $('rb-icon-pause');

  // ── Theme ──
  const html = document.documentElement;
  const savedTheme = localStorage.getItem('reader-theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);

  btnTheme.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('reader-theme', next);
  });

  // ── Reading mode ──
  let readingActive = false;
  let barHideTimer  = null;

  function showBar() {
    readingBar.classList.add('visible');
    clearTimeout(barHideTimer);
    barHideTimer = setTimeout(() => readingBar.classList.remove('visible'), 3000);
  }

  function syncReadingBar() {
    const playing = state.speaking && !state.paused;
    rbIconPlay.style.display  = playing ? 'none' : '';
    rbIconPause.style.display = playing ? '' : 'none';
    rbTimer.textContent = timeLeftEl.textContent || '00:00:00 / 00:00:00';
  }

  function enterReading() {
    readingActive = true;
    document.body.classList.add('reading-mode');
    document.documentElement.requestFullscreen?.().catch(() => {});
    showBar();
    syncReadingBar();
  }

  function exitReading() {
    readingActive = false;
    document.body.classList.remove('reading-mode');
    readingBar.classList.remove('visible');
    if (document.fullscreenElement) document.exitFullscreen?.();
  }

  btnReading.addEventListener('click', enterReading);
  rbExit.addEventListener('click', exitReading);
  rbPrev.addEventListener('click', () => jumpTo(state.currentIdx - 1));
  rbNext.addEventListener('click', () => jumpTo(state.currentIdx + 1));
  rbPlay.addEventListener('click', togglePlay);

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && readingActive) exitReading();
  });

  document.addEventListener('mousemove', () => { if (readingActive) showBar(); });
  document.addEventListener('touchstart', () => { if (readingActive) showBar(); }, { passive: true });

  // ── Font size ──
  const savedFontSize = parseInt(localStorage.getItem('reader-fontsize') || '16', 10);
  fontsizeSlider.value = savedFontSize;
  fontsizeVal.textContent = savedFontSize + 'px';
  textDisplay.style.fontSize = savedFontSize + 'px';

  fontsizeSlider.addEventListener('input', () => {
    const px = fontsizeSlider.value + 'px';
    textDisplay.style.fontSize = px;
    fontsizeVal.textContent = px;
    localStorage.setItem('reader-fontsize', fontsizeSlider.value);
  });

  // ── Text width ──
  const savedTextWidth = parseInt(localStorage.getItem('reader-textwidth') || '72', 10);
  textwSlider.value = savedTextWidth;
  textwVal.textContent = savedTextWidth + ' ch';
  textDisplay.style.maxWidth = savedTextWidth + 'ch';

  textwSlider.addEventListener('input', () => {
    const ch = textwSlider.value + 'ch';
    textDisplay.style.maxWidth = ch;
    textwVal.textContent = textwSlider.value + ' ch';
    localStorage.setItem('reader-textwidth', textwSlider.value);
  });

  // ── Text background ──
  const BG_PRESETS = {
    'bg-default': '',
    'bg-warm':    '#faf6ee',
    'bg-white':   '#ffffff',
    'bg-dark':    '#12151f',
  };

  const bgSwatches = Object.keys(BG_PRESETS).map(id => $(id));
  const bgCustom   = $('bg-custom');

  function applyBg(color, activeId) {
    contentBody.style.background = color;
    bgSwatches.forEach(el => el.classList.toggle('active', el.id === activeId));
    bgCustom.classList.toggle('active', activeId === 'bg-custom');
    localStorage.setItem('reader-bg-color', color);
    localStorage.setItem('reader-bg-id',    activeId);
  }

  bgSwatches.forEach(el => {
    el.addEventListener('click', () => applyBg(BG_PRESETS[el.id], el.id));
  });

  bgCustom.addEventListener('input', () => applyBg(bgCustom.value, 'bg-custom'));

  const savedBgId    = localStorage.getItem('reader-bg-id')    || 'bg-default';
  const savedBgColor = localStorage.getItem('reader-bg-color') || '';
  if (savedBgId === 'bg-custom' && savedBgColor) bgCustom.value = savedBgColor;
  applyBg(savedBgColor, savedBgId);

  // ── Auto-scroll: detect manual scroll ──
  // `wheel` only fires on user-initiated scrolling (not programmatic)
  contentBody.addEventListener('wheel', () => {
    if (!state.programmaticScroll) setAutoScroll(false);
  }, { passive: true });

  // Touch drag
  contentBody.addEventListener('touchmove', () => {
    if (!state.programmaticScroll) setAutoScroll(false);
  }, { passive: true });

  // Keyboard page-up/down while content is focused
  contentBody.addEventListener('keydown', e => {
    if (e.code === 'PageUp' || e.code === 'PageDown' || e.code === 'Home' || e.code === 'End') {
      setAutoScroll(false);
    }
  });

  function setAutoScroll(on) {
    state.autoScroll = on;
    autoscrollBadge.classList.toggle('visible', !on);
  }

  // ── Speech synthesis ──
  const synth = window.speechSynthesis;

  if (!synth) {
    setStatus('error', 'Web Speech API не підтримується у вашому браузері');
  }

  function loadVoices() {
    const voices = synth.getVoices();
    state.voices = voices;
    const previousVoice = voiceSel.value;
    voiceSel.innerHTML = '';

    const uk    = voices.filter(v => v.lang.startsWith('uk'));
    const other = voices.filter(v => !v.lang.startsWith('uk'));

    if (uk.length === 0 && voices.length === 0) {
      voiceSel.innerHTML = '<option value="">— голоси не знайдено —</option>';
      return;
    }

    if (uk.length > 0) {
      const grp = document.createElement('optgroup');
      grp.label = '🇺🇦 Українська';
      uk.forEach(v => {
        const o = document.createElement('option');
        o.value = v.name;
        o.textContent = `${v.name} (${v.lang})`;
        if (v.default) o.selected = true;
        grp.appendChild(o);
      });
      voiceSel.appendChild(grp);
      if (!uk.some(v => v.default)) voiceSel.querySelector('option').selected = true;
    }

    if (other.length > 0) {
      const grp = document.createElement('optgroup');
      grp.label = 'Інші мови';
      other.forEach(v => {
        const o = document.createElement('option');
        o.value = v.name;
        o.textContent = `${v.name} (${v.lang})`;
        grp.appendChild(o);
      });
      voiceSel.appendChild(grp);
    }

    if (uk.length === 0) {
      setStatus('error', 'Українські голоси не знайдено. Перевірте мовні пакети ОС.');
    }

    // Restore previously selected voice if it still exists in the new list
    if (previousVoice && Array.from(voiceSel.options).some(o => o.value === previousVoice)) {
      voiceSel.value = previousVoice;
    }
  }

  synth.addEventListener('voiceschanged', loadVoices);
  loadVoices();

  // ── Language detection ──
  function detectLanguage(text) {
    const sample = text.slice(0, 2000);

    const ukSpecific  = (sample.match(/[іїєґІЇЄҐ]/g)  || []).length;
    const ruSpecific  = (sample.match(/[ыэъёЫЭЪЁ]/g)  || []).length;
    const cyrillic    = (sample.match(/[а-яА-ЯіїєґІЇЄҐёЁыЫэЭъЪ]/g) || []).length;
    const latin       = (sample.match(/[a-zA-Z]/g)      || []).length;
    const german      = (sample.match(/[äöüßÄÖÜ]/g)     || []).length;
    const french      = (sample.match(/[àâéèêëîïôùûçÀÂÉÈÊËÎÏÔÙÛÇ]/g) || []).length;
    const spanish     = (sample.match(/[ñáéíóúüÑÁÉÍÓÚÜ¿¡]/g) || []).length;
    const polish      = (sample.match(/[ąęóśźżćńłĄĘÓŚŹŻĆŃŁ]/g) || []).length;

    if (cyrillic > latin) {
      if (ukSpecific > ruSpecific) return 'uk';
      if (ruSpecific > ukSpecific) return 'ru';
      return 'uk';
    }

    if (latin > 0) {
      const scores = { de: german, fr: french, es: spanish, pl: polish };
      const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
      if (top[1] > 3) return top[0];
      return 'en';
    }

    return 'en';
  }

  function autoSelectVoice(langCode) {
    const voices = synth.getVoices();
    if (!voices.length) return;
    const lc = langCode.toLowerCase();
    const preferred = { uk: 'uk-UA', de: 'de-DE', fr: 'fr-FR', es: 'es-ES', pl: 'pl-PL', ru: 'ru-RU', en: 'en-US' };
    const exact  = voices.find(v => v.lang.toLowerCase() === lc);
    const std    = preferred[lc] && voices.find(v => v.lang === preferred[lc]);
    const prefix = voices.find(v => v.lang.toLowerCase().startsWith(lc));
    const match  = exact || std || prefix;
    if (match) voiceSel.value = match.name;
  }

  // ── File loading ──
  function handleText(rawText, fileName, ext) {
    state.rawText  = rawText;
    state.fileName = fileName;
    processText(rawText, ext);

    const words = rawText.trim().split(/\s+/).length;
    const kb    = (new Blob([rawText]).size / 1024).toFixed(1);
    fileInfo.style.display  = 'block';
    fileNameEl.textContent  = fileName;
    fileMeta.textContent    = `${kb} КБ · ${words.toLocaleString('uk')} слів · ${state.sentences.length} речень`;
    toolbarName.textContent = fileName;

    autoSelectVoice(detectLanguage(rawText));
    state.totalSpokenMs    = 0;
    state.totalSpokenChars = 0;
    state.totalMs          = estimateFromIdx(0);
    stopSpeech();
    state.currentIdx = 0;
    setAutoScroll(true);
    updateProgress();
    enableControls(true);
    setStatus('idle', 'Готово до відтворення');
  }

  function handleFile(file) {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'pdf') { handlePdf(file); return; }
    if (ext === 'html' || ext === 'htm') { handleHtml(file); return; }
    if (!['txt', 'md'].includes(ext)) {
      setStatus('error', 'Непідтримуваний формат. Використовуйте .txt, .md, .html або .pdf');
      return;
    }
    const reader = new FileReader();
    reader.onload  = e => handleText(e.target.result, file.name, ext);
    reader.onerror = () => setStatus('error', 'Помилка читання файлу');
    reader.readAsText(file, 'UTF-8');
  }

  function handleHtml(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(e.target.result, 'text/html');
      // Remove non-content elements
      doc.querySelectorAll('script, style, noscript, meta, link, head').forEach(el => el.remove());
      const body = doc.body || doc.documentElement;
      // Preserve block-level spacing for better sentence splitting
      body.querySelectorAll('p, div, h1, h2, h3, h4, h5, h6, li, br, tr').forEach(el => {
        el.after(doc.createTextNode('\n'));
      });
      const text = (body.textContent || '').replace(/\n{3,}/g, '\n\n').trim();
      if (!text) {
        setStatus('error', 'HTML файл не містить тексту');
        return;
      }
      handleText(text, file.name, 'txt');
    };
    reader.onerror = () => setStatus('error', 'Помилка читання файлу');
    reader.readAsText(file, 'UTF-8');
  }

  async function handlePdf(file) {
    setStatus('loading', 'Завантаження PDF.js…');
    try {
      // Load PDF.js from CDN
      const PDFJS_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
      const WORKER_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
      const pdfjsLib = await import(PDFJS_URL);
      pdfjsLib.GlobalWorkerOptions.workerSrc = WORKER_URL;

      setStatus('loading', 'Читання PDF…');
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const totalPages = pdf.numPages;
      const pageTexts = [];

      for (let i = 1; i <= totalPages; i++) {
        setStatus('loading', `Читання PDF, сторінка ${i} / ${totalPages}…`);
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        // Join items; insert newline when y-position changes significantly
        let lastY = null;
        let pageText = '';
        let addedNewline = false;
        for (const item of content.items) {
          if (item.str === undefined) continue;
          const y = item.transform ? item.transform[5] : null;
          if (!addedNewline && lastY !== null && y !== null && Math.abs(y - lastY) > 5) {
            pageText += '\n';
          }
          pageText += item.str;
          addedNewline = false;
          if (item.hasEOL) { pageText += '\n'; addedNewline = true; }
          lastY = y;
        }
        pageTexts.push(pageText.trim());
      }

      const fullText = pageTexts.join('\n\n');
      if (!fullText.trim()) {
        setStatus('error', 'PDF не містить тексту (можливо, це скановане зображення)');
        return;
      }
      handleText(fullText, file.name, 'txt');
    } catch (err) {
      console.error(err);
      setStatus('error', 'Помилка читання PDF: ' + err.message);
    }
  }

  // ── Text processing ──
  function processText(text, ext) {
    placeholder.style.display = 'none';
    textDisplay.style.display = 'block';
    textDisplay.innerHTML = '';

    state.sentences = splitSentences(text);
    progTotal.textContent = `${state.sentences.length} речень`;

    if (ext === 'md') {
      renderMarkdown(text);
    } else {
      renderPlain(text);
    }

    if (state.searchTerm) applySearch(state.searchTerm);
  }

  function splitSentences(text) {
    const raw = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    // Split on sentence-ending punctuation, but NOT after abbreviations (vs., dr., nr. etc.)
    const parts = raw.split(/(?<=\w{3,}[.])\s+|(?<=\*{1,2}[.])\s+|(?<=[!?…»]\*{0,2})\s+|(?<=\n)\n+/);
    return parts.map(s => s.trim()).filter(s => s.length > 1);
  }

  // ── Renderers (DOM-based, no string replacement) ──
  function renderPlain(text) {
    textDisplay.innerHTML = '';
    const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    let pos = 0;

    state.sentences.forEach((s, i) => {
      const found = normalized.indexOf(s, pos);
      if (found === -1) return;

      if (found > pos) {
        textDisplay.appendChild(document.createTextNode(normalized.slice(pos, found)));
      }

      const span = document.createElement('span');
      span.className = 'sentence';
      span.dataset.idx = String(i);
      span.textContent = s;
      textDisplay.appendChild(span);

      pos = found + s.length;
    });

    if (pos < normalized.length) {
      textDisplay.appendChild(document.createTextNode(normalized.slice(pos)));
    }

    bindSentenceClicks();
  }

  function renderMarkdown(text) {
    textDisplay.innerHTML = '';
    const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    let pos = 0;

    // Pre-compute sentence positions in the text
    const sentencePositions = [];
    let searchPos = 0;
    state.sentences.forEach((s, i) => {
      const found = normalized.indexOf(s, searchPos);
      if (found !== -1) {
        sentencePositions.push({ idx: i, text: s, start: found, end: found + s.length });
        searchPos = found + s.length;
      }
    });

    function appendInline(parent, raw) {
      const re = /(\*\*(.+?)\*\*|\*(.+?)\*|`(.+?)`)/g;
      let last = 0, m;
      while ((m = re.exec(raw)) !== null) {
        if (m.index > last) parent.appendChild(document.createTextNode(raw.slice(last, m.index)));
        let node;
        if      (m[0].startsWith('**')) { node = document.createElement('span'); node.className = 'md-bold';   node.textContent = m[2]; }
        else if (m[0].startsWith('*'))  { node = document.createElement('span'); node.className = 'md-italic'; node.textContent = m[3]; }
        else                            { node = document.createElement('span'); node.className = 'md-code';   node.textContent = m[4]; }
        parent.appendChild(node);
        last = re.lastIndex;
      }
      if (last < raw.length) parent.appendChild(document.createTextNode(raw.slice(last)));
    }

    function flushText(upTo) {
      if (pos >= upTo) return;
      const chunk   = normalized.slice(pos, upTo);
      const inChunk = sentencePositions.filter(sp => sp.start >= pos && sp.end <= upTo);

      let localPos = 0;
      inChunk.forEach(sp => {
        const relStart = sp.start - pos;
        const relEnd   = sp.end   - pos;
        if (relStart > localPos) {
          appendInline(textDisplay, chunk.slice(localPos, relStart));
        }
        const span = document.createElement('span');
        span.className = 'sentence';
        span.dataset.idx = String(sp.idx);
        appendInline(span, sp.text);
        textDisplay.appendChild(span);
        localPos = relEnd;
      });

      if (localPos < chunk.length) {
        appendInline(textDisplay, chunk.slice(localPos));
      }
      pos = upTo;
    }

    const lines = normalized.split('\n');
    let lineStart = 0;

    lines.forEach(line => {
      const lineEnd = lineStart + line.length + 1;
      const t = line.trim();

      let tag = null, content = '';
      if      (!t)                       { /* blank */ }
      else if (/^#{3}\s/.test(t))        { tag = 'md-h3'; content = t.slice(4); }
      else if (/^#{2}\s/.test(t))        { tag = 'md-h2'; content = t.slice(3); }
      else if (/^#\s/.test(t))           { tag = 'md-h1'; content = t.slice(2); }
      else if (/^---+$/.test(t))         { tag = 'md-hr'; }
      else if (/^>\s/.test(t))           { tag = 'md-blockquote'; content = t.slice(2); }
      else if (/^[-*]\s/.test(t))        { tag = 'md-li'; content = t.slice(2); }
      else if (/^\d+\.\s/.test(t))       { tag = 'md-li'; content = t.replace(/^\d+\.\s/, ''); }

      if (tag === 'md-hr') {
        flushText(lineStart);
        const el = document.createElement('span');
        el.className = 'md-hr';
        textDisplay.appendChild(el);
        pos = lineEnd;
      } else if (tag) {
        flushText(lineStart);
        const el = document.createElement('span');
        el.className = tag;
        appendInline(el, content);
        textDisplay.appendChild(el);
        textDisplay.appendChild(document.createTextNode('\n'));
        pos = lineEnd;
      }

      lineStart = lineEnd;
    });

    flushText(normalized.length);
    bindSentenceClicks();
  }

  function bindSentenceClicks() {
    textDisplay.querySelectorAll('.sentence').forEach(el => {
      el.addEventListener('click', () => jumpTo(parseInt(el.dataset.idx, 10)));
    });
  }

  // ── Speech playback ──
  function formatHMS(ms) {
    const total = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    const p = n => String(n).padStart(2, '0');
    return `${p(h)}:${p(m)}:${p(s)}`;
  }

  function updateTimer() {
    if (!state.totalMs) { timeLeftEl.textContent = ''; return; }
    const currentElapsed = (state.speaking && !state.paused && state.sentenceStartTime)
      ? Date.now() - state.sentenceStartTime : 0;
    const elapsed = state.totalSpokenMs + currentElapsed;
    timeLeftEl.textContent = `${formatHMS(elapsed)} / ${formatHMS(state.totalMs)}`;
  }

  function estimateFromIdx(fromIdx) {
    const remaining = state.sentences.slice(fromIdx);
    if (!remaining.length) return 0;
    if (state.totalSpokenMs > 0 && state.totalSpokenChars > 0) {
      const msPerChar = state.totalSpokenMs / state.totalSpokenChars;
      return remaining.reduce((s, t) => s + stripMd(t).length, 0) * msPerChar;
    }
    const words = remaining.join(' ').trim().split(/\s+/).length;
    const wpm   = 130 * parseFloat(rateSlider.value);
    return (words / wpm) * 60000;
  }

  function stripMd(text) {
    return text
      .replace(/^#{1,6}\s+/gm, '')       // headings
      .replace(/\*\*(.+?)\*\*/g, '$1')   // bold
      .replace(/\*(.+?)\*/g, '$1')       // italic
      .replace(/`(.+?)`/g, '$1')         // inline code
      .replace(/^>\s+/gm, '')            // blockquote
      .replace(/^[-*]\s+/gm, '')         // unordered list
      .replace(/^\d+\.\s+/gm, '')        // ordered list
      .replace(/^---+$/gm, '')           // hr
      .trim();
  }

  function getVoice() {
    const name = voiceSel.value;
    return synth.getVoices().find(v => v.name === name) || null;
  }

  function makeUtterance(idx) {
    const text = stripMd(state.sentences[idx]);
    const utt  = new SpeechSynthesisUtterance(text);
    utt.voice  = getVoice();
    utt.lang   = utt.voice ? utt.voice.lang : 'uk-UA';
    utt.rate   = parseFloat(rateSlider.value);
    utt.pitch  = parseFloat(pitchSlider.value);
    utt.volume = parseFloat(volSlider.value);

    utt.onstart = () => {
      state.speaking = true;
      state.paused   = false;
      state.currentIdx = idx;
      state.sentenceStartTime = Date.now();
      state.totalMs = state.totalSpokenMs + estimateFromIdx(idx);
      setStatus('speaking', `Читання речення ${idx + 1} / ${state.sentences.length}`);
      highlightCurrent();
      updateProgress();
      setPlayingUI(true);
      scrollToActive();
    };

    utt.onend = () => {
      if (!state.speaking) return;
      const elapsed = Date.now() - state.sentenceStartTime;
      state.totalSpokenMs    += elapsed;
      state.totalSpokenChars += text.length;
      state.currentIdx = idx + 1;
      state.totalMs = state.totalSpokenMs + estimateFromIdx(state.currentIdx);
      const delay = parseInt(pauseSlider.value, 10);
      if (delay > 0) setTimeout(speakCurrent, delay);
      else speakCurrent();
    };

    utt.onerror = e => {
      if (e.error === 'interrupted' || e.error === 'canceled') return;
      if (e.error === 'synthesis-failed') {
        // text likely empty or unsupported — skip to next
        state.currentIdx = idx + 1;
        speakCurrent();
        return;
      }
      setStatus('error', `Помилка TTS: ${e.error}`);
    };

    return utt;
  }

  function speakCurrent() {
    if (!state.sentences.length) return;
    if (state.currentIdx >= state.sentences.length) { finishPlayback(); return; }
    // Skip sentences that have no speakable text after stripping markup
    while (state.currentIdx < state.sentences.length &&
           !stripMd(state.sentences[state.currentIdx]).trim()) {
      state.currentIdx++;
    }
    if (state.currentIdx >= state.sentences.length) { finishPlayback(); return; }
    synth.cancel();
    state.utterance = makeUtterance(state.currentIdx);
    synth.speak(state.utterance);
  }

  function togglePlay() {
    if (!state.sentences.length) return;

    if (state.speaking && !state.paused) {
      synth.pause();
      state.paused   = true;
      state.speaking = false;
      setPlayingUI(false);
      setStatus('paused', 'Пауза');
    } else if (state.paused) {
      synth.resume();
      state.paused   = false;
      state.speaking = true;
      state.sentenceStartTime = Date.now();
      setPlayingUI(true);
      setStatus('speaking', `Читання речення ${state.currentIdx + 1} / ${state.sentences.length}`);
    } else {
      speakCurrent();
    }
  }

  function stopSpeech() {
    state.speaking = false;
    state.paused   = false;
    if (state.utterance) {
      state.utterance.onend   = null;
      state.utterance.onerror = null;
    }
    synth.cancel();
    state.sentenceStartTime = 0;
    setPlayingUI(false);
    updateTimer();
    setStatus('idle', state.sentences.length ? 'Готово до відтворення' : 'Очікування файлу…');
    highlightCurrent();
    updateProgress();
  }

  // jumpTo re-enables auto-scroll (per requirement)
  function jumpTo(idx, restoreAutoScroll = true) {
    if (idx < 0) idx = 0;
    if (idx >= state.sentences.length) idx = state.sentences.length - 1;

    const wasPlaying = state.speaking || state.paused;

    state.speaking = false;
    state.paused   = false;
    if (state.utterance) {
      state.utterance.onend   = null;
      state.utterance.onerror = null;
    }
    synth.cancel();

    state.currentIdx = idx;
    state.totalMs = state.totalSpokenMs + estimateFromIdx(idx);
    updateTimer();

    // Calling from prev/next/sentence-click always restores auto-scroll
    if (restoreAutoScroll) setAutoScroll(true);

    highlightCurrent();
    updateProgress();
    scrollToActive();

    if (wasPlaying) {
      setTimeout(() => speakCurrent(), 100);
    } else {
      setStatus('idle', `Речення ${idx + 1} вибрано`);
    }
  }

  function finishPlayback() {
    state.speaking   = false;
    state.paused     = false;
    state.currentIdx = 0;
    state.sentenceStartTime = 0;
    setPlayingUI(false);
    updateTimer();
    setStatus('idle', 'Читання завершено');
    highlightCurrent();
    updateProgress();
    scrollToActive();
  }

  // ── UI helpers ──
  function setStatus(type, msg) {
    statusDot.className = 'status-dot' + (type !== 'idle' ? ' ' + type : '');
    statusText.textContent = msg;
  }

  function setPlayingUI(playing) {
    iconPlay.style.display  = playing ? 'none' : '';
    iconPause.style.display = playing ? '' : 'none';
    playLabel.textContent   = playing ? 'Пауза' : 'Відтворити';
    btnStop.disabled        = !playing && !state.paused;
    syncReadingBar();
  }

  function enableControls(on) {
    btnPlay.disabled = !on;
    btnPrev.disabled = !on;
    btnNext.disabled = !on;
  }

  function updateProgress() {
    const total = state.sentences.length;
    const cur   = state.currentIdx;
    const pct   = total ? (cur / total) * 100 : 0;
    progFill.style.width  = pct + '%';
    progCur.textContent   = cur;
    progTotal.textContent = `${total} речень`;
    $('percent-read').textContent = total ? `${pct.toFixed(1)}% прочитано` : '';
    btnPrev.disabled = cur <= 0 || !total;
    btnNext.disabled = cur >= total - 1 || !total;
  }

  function highlightCurrent() {
    textDisplay.querySelectorAll('.sentence').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.idx, 10) === state.currentIdx);
    });
  }

  function scrollToActive() {
    if (!state.autoScroll) return;
    const active = textDisplay.querySelector('.sentence.active');
    if (!active) return;

    // Mark as programmatic so wheel handler ignores this scroll event
    state.programmaticScroll = true;
    active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Smooth scroll in browsers takes ~400-600ms; clear flag after
    setTimeout(() => { state.programmaticScroll = false; }, 800);
  }

  // ── Search ──
  let searchTimeout;
  let searchMatches   = [];
  let searchActiveIdx = -1;

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      state.searchTerm = searchInput.value.trim();
      applySearch(state.searchTerm);
    }, 250);
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    e.shiftKey ? searchGoPrev() : searchGoNext();
  });

  searchNextBtn.addEventListener('click', searchGoNext);
  searchPrevBtn.addEventListener('click', searchGoPrev);

  function applySearch(term) {
    textDisplay.querySelectorAll('mark').forEach(m => { m.outerHTML = m.innerHTML; });
    searchMatches   = [];
    searchActiveIdx = -1;
    updateSearchUI();
    if (!term) return;

    const walker = document.createTreeWalker(textDisplay, NodeFilter.SHOW_TEXT);
    const nodes  = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);

    const re = new RegExp(escapeRegex(term), 'gi');
    nodes.forEach(node => {
      const text = node.nodeValue;
      if (!re.test(text)) return;
      re.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let last = 0, m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
        const mark = document.createElement('mark');
        mark.textContent = m[0];
        frag.appendChild(mark);
        last = re.lastIndex;
      }
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    });

    searchMatches = Array.from(textDisplay.querySelectorAll('mark'));
    if (searchMatches.length) {
      searchActiveIdx = 0;
      activateMatch(0, false);
    }
    updateSearchUI();
  }

  function activateMatch(idx, smooth = true) {
    searchMatches.forEach((m, i) => m.classList.toggle('active', i === idx));
    searchMatches[idx]?.scrollIntoView({ behavior: smooth ? 'smooth' : 'instant', block: 'center' });
  }

  function updateSearchUI() {
    const total   = searchMatches.length;
    const hasHits = total > 0;
    searchCount.textContent = hasHits ? `${searchActiveIdx + 1} / ${total}` : (state.searchTerm ? '0' : '');
    searchPrevBtn.classList.toggle('visible', hasHits);
    searchNextBtn.classList.toggle('visible', hasHits);
  }

  function searchGoNext() {
    if (!searchMatches.length) return;
    searchActiveIdx = (searchActiveIdx + 1) % searchMatches.length;
    activateMatch(searchActiveIdx);
    updateSearchUI();
  }

  function searchGoPrev() {
    if (!searchMatches.length) return;
    searchActiveIdx = (searchActiveIdx - 1 + searchMatches.length) % searchMatches.length;
    activateMatch(searchActiveIdx);
    updateSearchUI();
  }

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // ── Progress bar click ──
  progressBg.addEventListener('click', e => {
    if (!state.sentences.length) return;
    const rect = progressBg.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    const idx  = Math.round(pct * (state.sentences.length - 1));
    jumpTo(idx); // also re-enables auto-scroll
  });

  // ── Event listeners ──
  btnPlay.addEventListener('click', togglePlay);
  btnStop.addEventListener('click', () => { state.currentIdx = 0; stopSpeech(); });
  btnPrev.addEventListener('click', () => jumpTo(state.currentIdx - 1));
  btnNext.addEventListener('click', () => jumpTo(state.currentIdx + 1));

  rateSlider.addEventListener('input',  () => rateVal.textContent   = parseFloat(rateSlider.value).toFixed(2) + '×');
  pitchSlider.addEventListener('input', () => pitchVal.textContent  = parseFloat(pitchSlider.value).toFixed(2));
  volSlider.addEventListener('input',   () => volumeVal.textContent = Math.round(volSlider.value * 100) + '%');
  pauseSlider.addEventListener('input', () => pauseVal.textContent  = pauseSlider.value + ' мс');

  // File drop
  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  document.body.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  document.body.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  document.body.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  // ── Clipboard paste ──
  function pasteFromClipboard() {
    navigator.clipboard.readText().then(text => {
      if (!text.trim()) return;
      const looksLikeMd = /^#{1,6}\s|^\*\*|^>\s|^[-*]\s|\*\*.+\*\*/m.test(text);
      handleText(text, 'Буфер обміну', looksLikeMd ? 'md' : 'txt');
    }).catch(() => setStatus('error', 'Немає доступу до буфера обміну'));
  }

  $('btn-paste').addEventListener('click', pasteFromClipboard);

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

    if (e.code === 'KeyV' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      pasteFromClipboard();
      return;
    }

    if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight') { e.preventDefault(); jumpTo(state.currentIdx + 1); }
    if (e.code === 'ArrowLeft')  { e.preventDefault(); jumpTo(state.currentIdx - 1); }
    if (e.code === 'KeyR')       { readingActive ? exitReading() : enterReading(); }
    if (e.code === 'Escape')     { if (readingActive) { exitReading(); } else { state.currentIdx = 0; stopSpeech(); } }
  });

  // Chrome pauses synth on tab switch
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.speaking) synth.resume();
  });

  // ── Timer tick ──
  setInterval(() => {
    if (state.speaking && !state.paused) {
      updateTimer();
      if (readingActive) rbTimer.textContent = timeLeftEl.textContent;
    }
  }, 500);

})();
</script>
</body>
</html>
