<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Mastery</title>
  <link rel="apple-touch-icon" href="icon/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Word Mastery">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --primary: #6C5CE7;
      --primary-dark: #5849c2;
      --secondary: #00B894;
      --accent: #FDCB6E;
      --danger: #FF7675;
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #2d3436;
      --text-light: #636e72;
      --radius: 18px;
      --shadow: 0 6px 24px rgba(108,92,231,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Comfortaa', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }
    #app {
      width: 100%;
      max-width: 580px;
      padding-bottom: 80px;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border: none;
      border-radius: 50px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(108,92,231,.38); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--secondary); color: #fff; box-shadow: 0 4px 14px rgba(0,184,148,.35); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .btn-sm { padding: 8px 16px; font-size: 14px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .w-full { width: 100%; }
    .mt-1 { margin-top: 8px; }
    .mt-2 { margin-top: 16px; }
    .mt-3 { margin-top: 24px; }
    .mb-1 { margin-bottom: 8px; }
    .mb-2 { margin-bottom: 16px; }
    .text-center { text-align: center; }
    h2 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 12px; }
    h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    p { color: var(--text-light); line-height: 1.6; }
    .hidden { display: none !important; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 16px 0;
    }
    .stat-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }
    .stat-icon { font-size: 26px; }
    .stat-value { font-size: 20px; font-weight: 900; color: var(--primary); }
    .stat-label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    /* Progress bar */
    .progress-bar-wrap {
      background: #e0e0e0;
      border-radius: 50px;
      height: 10px;
      overflow: hidden;
      margin: 6px 0;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
      border-radius: 50px;
      transition: width 0.5s ease;
    }

    /* Level badge */
    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border-radius: 50px;
      font-weight: 800;
      font-size: 15px;
    }

    /* Exercise header */
    .exercise-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .exercise-badge {
      background: var(--primary);
      color: #fff;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
    }

    /* Word display */
    .word-display {
      font-size: 46px;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      padding: 20px;
      letter-spacing: 4px;
    }

    /* Collect exercise */
    .answer-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 16px;
      min-height: 72px;
      background: var(--bg);
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .answer-slot {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 3px solid var(--primary);
      font-size: 21px;
      font-weight: 800;
      color: var(--primary);
      transition: all 0.2s;
    }
    .answer-slot.filled { border-color: var(--secondary); color: var(--secondary); }

    .letters-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 8px 0;
    }
    .letter-tile {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 var(--primary-dark);
      user-select: none;
    }
    .letter-tile:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--primary-dark); }
    .letter-tile.used { opacity: 0.25; pointer-events: none; }
    .letter-tile.hint-glow { background: var(--accent); color: var(--text); }

    /* Text input */
    .word-input {
      width: 100%;
      font-family: 'Comfortaa', sans-serif;
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      padding: 14px;
      border: 3px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      letter-spacing: 4px;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .word-input:focus { border-color: var(--primary); }
    .word-input.correct { border-color: var(--secondary); background: #e8f8f5; }
    .word-input.wrong { border-color: var(--danger); background: #fff5f5; }

    /* Countdown */
    .countdown {
      font-size: 72px;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      line-height: 1;
    }

    /* Hint bar */
    .hint-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 0;
      margin-top: 8px;
      border-top: 1px solid #f0f0f0;
    }
    .hint-count { font-size: 13px; color: var(--text-light); }

    /* Feedback */
    .feedback-area { min-height: 40px; text-align: center; margin-top: 10px; }
    .correct-word-show {
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      color: var(--secondary);
      letter-spacing: 4px;
      margin: 6px 0;
    }
    .wrong-attempt-show {
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: var(--danger);
      letter-spacing: 4px;
      text-decoration: line-through;
      margin: 4px 0;
    }
    .correction-box {
      background: #fff3cd;
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 14px;
      margin-top: 10px;
    }
    .correction-box p { margin-bottom: 8px; font-weight: 700; color: var(--text); }

    /* Sound button */
    .sound-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 54px;
      height: 54px;
      font-size: 26px;
      cursor: pointer;
      transition: transform 0.15s;
      box-shadow: 0 3px 10px rgba(253,203,110,.4);
    }
    .sound-btn:active { transform: scale(0.9); }

    /* Session complete */
    .session-stars-big { font-size: 64px; text-align: center; margin: 12px 0; }

    /* Word list */
    .word-list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .word-list-item:last-child { border-bottom: none; }
    .word-status { font-size: 18px; flex-shrink: 0; }
    .word-name { font-size: 16px; font-weight: 700; flex: 1; }
    .word-meta { font-size: 12px; color: var(--text-light); }

    /* Badge */
    .badge {
      background: linear-gradient(135deg, #fff9e6, #fff3cd);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .badge-icon { font-size: 30px; }
    .badge-name { font-weight: 800; font-size: 15px; }
    .badge-desc { font-size: 12px; color: var(--text-light); }

    /* Chart */
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 116px;
      margin: 8px 0;
    }
    .chart-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      gap: 4px;
    }
    .chart-bar {
      width: 100%;
      background: var(--primary);
      border-radius: 5px 5px 0 0;
      min-height: 3px;
      transition: height 0.6s ease;
      opacity: 0.85;
    }
    .chart-val { font-size: 10px; font-weight: 700; color: var(--primary); min-height: 14px; }
    .chart-lbl { font-size: 10px; color: var(--text-light); }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-light);
    }
    .tab.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,.1); }

    /* Overlay / Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.52);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 520px;
      max-height: 88vh;
      overflow-y: auto;
    }

    /* PIN */
    .pin-display {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin: 16px 0;
    }
    .pin-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      transition: background 0.15s;
    }
    .pin-dot.filled { background: var(--primary); }
    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 260px;
      margin: 0 auto;
    }
    .pin-key {
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
    }
    .pin-key:active { background: var(--bg); transform: scale(0.93); }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 24px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(108,92,231,.42);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .fab:hover { transform: scale(1.1); }

    /* Textarea */
    .textarea-words {
      width: 100%;
      min-height: 110px;
      font-family: 'Comfortaa', sans-serif;
      font-size: 15px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      resize: vertical;
    }
    .textarea-words:focus { border-color: var(--primary); }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    /* Number input */
    input[type="number"], input[type="text"] {
      font-family: 'Comfortaa', sans-serif;
    }
    .settings-input {
      width: 100%;
      padding: 9px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      font-family: 'Comfortaa', sans-serif;
      outline: none;
    }
    .settings-input:focus { border-color: var(--primary); }

    /* Animations */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    @keyframes pop {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }
    .shake { animation: shake 0.4s ease; }
    .pop { animation: pop 0.3s ease; }

    @media (max-width: 400px) {
      .word-display { font-size: 34px; }
      .letter-tile, .answer-slot { width: 40px; height: 40px; font-size: 18px; }
      .word-input { font-size: 24px; }
      .countdown { font-size: 56px; }
    }
  </style>
</head>
<body>

<div id="app"></div>
<button class="fab hidden" id="fab-parent" onclick="App.showParentPanel()">📊</button>

<script>
// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
const Store = {
  KEY: 'word_mastery_v1',
  load() {
    try { const r = localStorage.getItem(this.KEY); return r ? JSON.parse(r) : null; }
    catch { return null; }
  },
  save(d) { localStorage.setItem(this.KEY, JSON.stringify(d)); },
  defaults() {
    return {
      words: [],
      stats: { totalStars: 0, streakDays: 0, lastSessionDate: null,
               correctStreak: 0, totalCorrect: 0, sessions: [] },
      badges: [],
      groups: [],
      settings: { minWordsPerSession: 5, maxWordsPerSession: 20, sessionWords: 10, pin: '1234', ttsLang: 'de-DE', ttsVoice: '', activeGroups: [] },
      initialized: false,
    };
  }
};

// ═══════════════════════════════════════════
// WORD MANAGER
// ═══════════════════════════════════════════
const Words = {
  create(text) {
    return { id: Date.now() + '_' + Math.random().toString(36).slice(2),
             text: text.trim(), weight: 3, status: 'new',
             correctStreak: 0, totalCorrect: 0, totalAttempts: 0,
             lastDate: null, lastResult: null, groupId: null };
  },
  buildExtras(wordText) {
    const uniqueLetters = new Set(wordText.toLowerCase().split(''));
    const alphabet = 'abcdefghijklmnopqrstuvwxyzäöü'.split('').filter(c => !uniqueLetters.has(c));
    const extraCount = Math.round(wordText.length * 0.6);
    const shuffledAlpha = [...alphabet].sort(() => Math.random() - 0.5);
    const mandatory = [];
    // always one uppercase decoy letter
    if (shuffledAlpha.length > 0) mandatory.push({ l: shuffledAlpha[0].toUpperCase() });
    // if word has uppercase letter, add its lowercase as decoy
    const upperInWord = wordText.split('').find(c => c !== c.toLowerCase());
    if (upperInWord) mandatory.push({ l: upperInWord.toLowerCase() });
    const remaining = Math.max(0, extraCount - mandatory.length);
    return [...mandatory, ...shuffledAlpha.slice(1, 1 + remaining).map(l => ({ l }))];
  },
  getStatus(w) {
    if (w.weight >= 5) return 'hard';
    if (w.weight === 1 && w.correctStreak >= 3) return 'mastered';
    return 'learning';
  },
  updateWeight(w, result) {
    if (result === 'correct_first') {
      w.weight = Math.max(1, w.weight - 1);
      w.correctStreak++;
      w.totalCorrect++;
    } else if (result === 'correct_retry') {
      w.correctStreak++;
      w.totalCorrect++;
    } else { // wrong
      w.weight = Math.min(10, w.weight + 2);
      w.correctStreak = 0;
    }
    w.totalAttempts++;
    w.lastDate = new Date().toDateString();
    w.lastResult = result === 'wrong' ? 'wrong' : 'correct';
    w.status = this.getStatus(w);
  },
  selectForSession(words, count) {
    if (!words.length) return [];
    count = Math.min(count, words.length);
    const total = words.reduce((s, w) => s + w.weight, 0);
    const selected = [], used = new Set();
    let attempts = 0;
    while (selected.length < count && attempts < 2000) {
      attempts++;
      let r = Math.random() * total;
      for (const w of words) {
        r -= w.weight;
        if (r <= 0 && !used.has(w.id)) { selected.push(w); used.add(w.id); break; }
      }
    }
    // Fill any remaining slots
    for (const w of words) {
      if (selected.length >= count) break;
      if (!used.has(w.id)) { selected.push(w); used.add(w.id); }
    }
    return selected;
  },
  exerciseSequence(w) {
    if (w.status === 'mastered' || (w.lastResult === 'correct' && w.lastDate)) {
      return ['dictation', 'dictation'];
    }
    if (w.lastResult === 'wrong') {
      return ['write_after', 'dictation', 'dictation'];
    }
    // New word: full sequence
    return ['collect', 'write_after', 'dictation', 'dictation'];
  }
};

// ═══════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════
const TTS = {
  _voice: null,
  init() {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.onvoiceschanged = () => this.loadVoice();
    this.loadVoice();
  },
  loadVoice() {
    if (!window.speechSynthesis) return;
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return;
    const lang = App.data?.settings?.ttsLang || 'de-DE';
    const name = App.data?.settings?.ttsVoice || '';
    if (name) {
      const v = voices.find(v => v.name === name);
      if (v) { this._voice = v; return; }
    }
    this._voice = voices.find(v => v.lang.startsWith(lang.split('-')[0])) || null;
  },
  speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = App.data.settings.ttsLang || 'de-DE';
    u.rate = 0.8;
    if (this._voice) u.voice = this._voice;
    window.speechSynthesis.speak(u);
  }
};

// ═══════════════════════════════════════════
// REWARDS
// ═══════════════════════════════════════════
const LEVELS = [
  { name: 'Новачок',  icon: '🌱', min: 0 },
  { name: 'Учень',    icon: '📚', min: 50 },
  { name: 'Знавець',  icon: '🎓', min: 150 },
  { name: 'Майстер',  icon: '🏅', min: 300 },
  { name: 'Чемпіон',  icon: '🏆', min: 500 },
];
const BADGE_DEFS = [
  { id: 'first_correct', icon: '⭐', name: 'Перша зірочка',    desc: 'Написав перше слово правильно' },
  { id: 'streak_3',      icon: '🔥', name: 'Перша серія',       desc: '3 слова поспіль правильно' },
  { id: 'streak_10',     icon: '💯', name: '10 поспіль',        desc: '10 слів поспіль правильно' },
  { id: 'week_streak',   icon: '📅', name: 'Тижнева смуга',     desc: '7 днів занять поспіль' },
  { id: 'mastered_5',    icon: '🎯', name: "П'ять засвоєних",   desc: 'Засвоїв 5 слів' },
  { id: 'mastered_20',   icon: '🌟', name: 'Двадцять засвоєних',desc: 'Засвоїв 20 слів' },
];
const Rewards = {
  getLevel(stars) {
    let lv = LEVELS[0];
    for (const l of LEVELS) { if (stars >= l.min) lv = l; }
    return lv;
  },
  checkBadges(data) {
    const earned = [];
    const has = id => data.badges.includes(id);
    if (!has('first_correct') && data.stats.totalCorrect > 0) earned.push('first_correct');
    if (!has('streak_3')  && data.stats.correctStreak >= 3)  earned.push('streak_3');
    if (!has('streak_10') && data.stats.correctStreak >= 10) earned.push('streak_10');
    if (!has('week_streak') && data.stats.streakDays >= 7)   earned.push('week_streak');
    const mastered = data.words.filter(w => w.status === 'mastered').length;
    if (!has('mastered_5')  && mastered >= 5)  earned.push('mastered_5');
    if (!has('mastered_20') && mastered >= 20) earned.push('mastered_20');
    data.badges.push(...earned);
    return earned;
  }
};

// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
function playBeep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    } else {
      osc.frequency.setValueAtTime(280, ctx.currentTime);
      osc.frequency.setValueAtTime(180, ctx.currentTime + 0.15);
    }
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.45);
  } catch {}
}

// ═══════════════════════════════════════════
// GSAP STAR BURST
// ═══════════════════════════════════════════
function burstStars(count) {
  if (!window.gsap) return;
  const n = Math.min(Math.ceil(count * 4) + 3, 20);
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.textContent = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
      s.style.cssText = `position:fixed;font-size:${22+Math.random()*22}px;pointer-events:none;z-index:999;left:${10+Math.random()*80}%;top:-40px`;
      document.body.appendChild(s);
      gsap.to(s, { y: window.innerHeight + 60, x: (Math.random()-.5)*200,
                   rotation: (Math.random()-.5)*720, duration: 1.5+Math.random()*.8,
                   ease: 'power1.in', onComplete: () => s.remove() });
    }, i * 80);
  }
}

// ═══════════════════════════════════════════
// APP
// ═══════════════════════════════════════════
const App = {
  data: null,
  session: null,
  _pin: '',

  // ─── INIT ───────────────────────────────
  async init() {
    this.data = Store.load() || Store.defaults();
    if (!this.data.groups) this.data.groups = [];
    if (!this.data.settings.activeGroups) this.data.settings.activeGroups = [];
    TTS.init();
    if (!this.data.initialized) {
      await this.loadWords();
      this.data.initialized = true;
      Store.save(this.data);
    }
    this.checkStreak();
    this.render('home');
  },

  async loadWords() {
    try {
      const r = await fetch('data/words.txt');
      if (!r.ok) return;
      const lines = (await r.text()).split('\n').map(l => l.trim()).filter(Boolean);
      const groupId = Date.now() + '_' + Math.random().toString(36).slice(2);
      this.data.groups.push({ id: groupId, name: 'Starter', createdAt: Date.now() });
      this.data.words = lines.map(t => { const w = Words.create(t); w.groupId = groupId; return w; });
    } catch (e) { console.warn('words.txt not loaded:', e); }
  },

  checkStreak() {
    const last = this.data.stats.lastSessionDate;
    if (!last) return;
    const diff = Math.floor((Date.now() - new Date(last)) / 86400000);
    if (diff > 1) this.data.stats.streakDays = 0;
  },

  // ─── RENDER ─────────────────────────────
  render(screen, params = {}) {
    const app = document.getElementById('app');
    document.getElementById('fab-parent').classList.toggle('hidden', screen !== 'home');
    const el = document.createElement('div');
    switch (screen) {
      case 'home':             el.innerHTML = this.tplHome(); break;
      case 'session':          el.innerHTML = this.tplExercise(params); break;
      case 'session_complete': el.innerHTML = this.tplSessionComplete(params); break;
      case 'stats':            el.innerHTML = this.tplStats(); break;
      case 'admin_pin':        el.innerHTML = this.tplAdminPin(); break;
      case 'admin':            el.innerHTML = this.tplAdmin(); break;
      default:                 el.innerHTML = this.tplHome();
    }
    app.innerHTML = '';
    app.appendChild(el);
    if (screen === 'admin') this.populateTtsVoices();
    if (window.gsap) gsap.from(el, { opacity: 0, y: 18, duration: 0.35, ease: 'power2.out' });
    this.attachHandlers(screen, params);
  },

  // ─── HOME ────────────────────────────────
  tplHome() {
    const { totalStars, streakDays } = this.data.stats;
    const lv = Rewards.getLevel(totalStars);
    const mastered = this.data.words.filter(w => w.status === 'mastered').length;
    const total = this.data.words.length;
    const pct = total ? Math.round(mastered / total * 100) : 0;
    const minWps = this.data.settings.minWordsPerSession || 5;
    const maxWps = this.data.settings.maxWordsPerSession || 20;
    const wps = Math.min(maxWps, Math.max(minWps, this.data.settings.sessionWords || minWps));
    return `
    <div class="card">
      <div class="text-center" style="padding:12px 0 20px">
        <div style="font-size:30px;font-weight:900;color:var(--primary)">✏️ Тренажер правопису</div>
        <div style="font-size:14px;color:var(--text-light);margin-top:4px">Навчайся писати правильно!</div>
        <div style="margin-top:12px"><span class="level-badge">${lv.icon} ${lv.name}</span></div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-icon">⭐</div><div class="stat-value">${totalStars.toFixed(1)}</div><div class="stat-label">Зірочки</div></div>
        <div class="stat-box"><div class="stat-icon">🔥</div><div class="stat-value">${streakDays}</div><div class="stat-label">Днів поспіль</div></div>
        <div class="stat-box"><div class="stat-icon">✅</div><div class="stat-value">${mastered}</div><div class="stat-label">Засвоєно</div></div>
      </div>
      ${total === 0 ? `
        <div style="text-align:center;padding:24px;color:var(--text-light)">
          <div style="font-size:40px;margin-bottom:8px">📋</div>
          <p>Немає слів для тренування.<br>Попросіть батьків додати слова.</p>
        </div>
      ` : `
        <div class="mb-2">
          <div class="section-title">Прогрес: ${mastered} з ${total} слів засвоєно</div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>
        ${this.data.groups.length ? `
        <div style="margin-bottom:14px">
          <div class="section-title" style="margin-bottom:6px">Групи для вивчення:</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${this.data.groups.map(g => {
              const active = this.data.settings.activeGroups.includes(g.id);
              return `<button onclick="App.toggleGroup('${g.id}')" style="padding:5px 12px;border-radius:20px;border:2px solid var(--primary);background:${active?'var(--primary)':'transparent'};color:${active?'#fff':'var(--primary)'};font-size:13px;font-weight:600;cursor:pointer">${this.escHtml(g.name)}</button>`;
            }).join('')}
          </div>
          ${this.data.settings.activeGroups.length ? `<div style="font-size:12px;color:var(--text-light);margin-top:5px">Вибрано: ${this.data.settings.activeGroups.length} з ${this.data.groups.length} груп</div>` : `<div style="font-size:12px;color:var(--text-light);margin-top:5px">Всі групи</div>`}
        </div>` : ''}
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
          <span style="font-size:14px;color:var(--text-light);white-space:nowrap">Слів за сесію:</span>
          <input type="range" id="wps-range" min="${minWps}" max="${maxWps}" value="${wps}" style="flex:1"
            oninput="document.getElementById('wps-val').textContent=this.value;App.data.settings.sessionWords=+this.value">
          <span id="wps-val" style="font-weight:900;color:var(--primary);min-width:26px">${wps}</span>
        </div>
        <button class="btn btn-primary w-full" style="font-size:19px;padding:16px" onclick="App.startSession()">🚀 Почати тренування</button>
      `}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
        <button class="btn btn-ghost" onclick="App.render('stats')">📊 Статистика</button>
        <button class="btn btn-ghost" onclick="App.render('admin_pin')">⚙️ Налаштування</button>
      </div>
    </div>`;
  },

  // ─── SESSION START ────────────────────────
  startSession() {
    Store.save(this.data); // save slider change
    const minWps = this.data.settings.minWordsPerSession || 5;
    const maxWps = this.data.settings.maxWordsPerSession || 20;
    const count = Math.min(maxWps, Math.max(minWps, this.data.settings.sessionWords || minWps));
    const activeGroups = this.data.settings.activeGroups || [];
    const pool = activeGroups.length
      ? this.data.words.filter(w => activeGroups.includes(w.groupId))
      : this.data.words;
    const words = Words.selectForSession(pool, count);
    if (!words.length) { alert('Немає слів!'); return; }
    const queue = [];
    for (const w of words) {
      const seq = Words.exerciseSequence(w);
      for (const type of seq) queue.push({ word: w, type, attempts: 0, hintPenalty: 0 });
    }
    this.session = {
      words, queue, currentIdx: 0,
      starsEarned: 0, hintsUsed: 0,
      wordStars: {}, wordResults: {}, wordErrors: {},
      startTime: Date.now(), newBadges: [],
    };
    this.renderExercise();
  },

  renderExercise() {
    const { session } = this;
    if (!session || session.currentIdx >= session.queue.length) { this.finishSession(); return; }
    this.render('session', { item: session.queue[session.currentIdx], session });
  },

  // ─── EXERCISE SCREEN ─────────────────────
  tplExercise({ item, session }) {
    const labels = { collect: '🔤 Збери слово', write_after: "👁️ Напиши по пам'яті", dictation: '🎧 Диктант' };
    const wordIdx = session.words.indexOf(item.word) + 1;
    const pct = Math.round((wordIdx - 1) / session.words.length * 100);
    return `
    <div class="card">
      <div class="exercise-header">
        <span class="exercise-badge">${labels[item.type]}</span>
        <span style="font-size:13px;color:var(--text-light)">${wordIdx} / ${session.words.length}</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div id="exercise-area" style="margin-top:20px">${this.tplExerciseArea(item)}</div>
      <div class="hint-bar">
        <span class="hint-count" id="hint-count-lbl">💡 Підказок залишилось: ${3 - session.hintsUsed}</span>
        <button class="btn btn-ghost btn-sm" onclick="App.showHint()" id="hint-btn"
          ${session.hintsUsed >= 3 ? 'disabled' : ''}>💡 Підказка</button>
      </div>
    </div>`;
  },

  tplExerciseArea(item) {
    switch (item.type) {
      case 'collect':    return this.tplCollect(item);
      case 'write_after':return this.tplWriteAfter(item);
      case 'dictation':  return this.tplDictation(item);
    }
  },

  // ─── COLLECT WORD ────────────────────────
  tplCollect(item) {
    const letters = item.word.text.split('').map((l, i) => ({ l, i }));
    const shuffled = [...letters].sort(() => Math.random() - 0.5);
    item._cs = item._cs || { original: letters, shuffled, selected: [] };

    setTimeout(() => TTS.speak(item.word.text), 250);

    let t = 3;
    const iv = setInterval(() => {
      const cd = document.getElementById('collect-countdown');
      if (!cd) { clearInterval(iv); return; }
      t--;
      if (t <= 0) { clearInterval(iv); App.collectReveal(); return; }
      cd.textContent = t;
    }, 1000);

    return `
    <div id="collect-wrap">
      <div class="text-center mb-2"><p style="font-size:16px">Запам'ятай слово:</p></div>
      <div style="font-size:42px;font-weight:800;letter-spacing:6px;text-align:center;padding:16px 0">${this.escHtml(item.word.text)}</div>
      <div id="collect-countdown" style="font-size:22px;text-align:center;color:var(--text-light);margin-top:4px">3</div>
      <div class="text-center" style="margin-top:16px">
        <button class="btn btn-secondary" onclick="App.collectKnow()">✅ Знаю</button>
      </div>
    </div>`;
  },

  collectReveal() {
    const wrap = document.getElementById('collect-wrap');
    if (!wrap) return;
    const item = this.session?.queue[this.session.currentIdx];
    if (!item) return;
    const cs = item._cs;
    const slots = cs.original.map((_, i) =>
      `<div class="answer-slot" id="slot-${i}"></div>`).join('');
    const tiles = cs.shuffled.map((lt, ti) =>
      `<div class="letter-tile${cs.selected.some(s => s.ti === ti) ? ' used' : ''}" id="tile-${ti}" onclick="App.collectClick(${ti})">${lt.l}</div>`
    ).join('');
    wrap.innerHTML = `
      <div class="text-center mb-2"><p style="font-size:16px">Склади слово з букв:</p></div>
      <div class="answer-slots" id="answer-slots">${slots}</div>
      <div class="letters-pool">${tiles}</div>
      <div class="feedback-area" id="collect-fb"></div>`;
  },

  collectKnow() {
    const wrap = document.getElementById('collect-wrap');
    if (!wrap) return;
    const item = this.session?.queue[this.session.currentIdx];
    if (!item) return;
    if (!item._know) {
      const original = item.word.text.split('').map((l, i) => ({ l, i }));
      const extras = Words.buildExtras(item.word.text);
      const allTiles = [...original.map(lt => ({ l: lt.l })), ...extras].sort(() => Math.random() - 0.5);
      item._know = { original, shuffled: allTiles, selected: [] };
    }
    const kw = item._know;
    const slots = kw.original.map((_, i) => `<div class="answer-slot" id="kslot-${i}"></div>`).join('');
    const tiles = kw.shuffled.map((lt, ti) =>
      `<div class="letter-tile" id="ktile-${ti}" onclick="App.collectKnowClick(${ti})">${lt.l}</div>`
    ).join('');
    wrap.innerHTML = `
      <div class="text-center mb-2"><p style="font-size:16px">Склади слово для підтвердження:</p></div>
      <div class="answer-slots" id="know-slots">${slots}</div>
      <div class="letters-pool">${tiles}</div>
      <div class="feedback-area" id="know-fb"></div>`;
  },

  collectKnowClick(ti) {
    const { session } = this;
    const item = session.queue[session.currentIdx];
    const kw = item._know;
    if (kw.selected.some(s => s.ti === ti)) return;
    const tile = kw.shuffled[ti];
    const nextPos = kw.selected.length;
    const expected = kw.original[nextPos].l;
    const tileDom = document.getElementById(`ktile-${ti}`);
    const slotDom = document.getElementById(`kslot-${nextPos}`);
    if (tile.l === expected) {
      tileDom.classList.add('used');
      slotDom.textContent = tile.l;
      slotDom.classList.add('filled');
      kw.selected.push({ ti });
      if (window.gsap) gsap.from(slotDom, { scale: 0, duration: 0.2, ease: 'back.out' });
      if (kw.selected.length === kw.original.length) {
        document.getElementById('know-fb').innerHTML =
          '<span style="color:var(--secondary);font-size:20px;font-weight:800">✓ Чудово! Слово засвоєно!</span>';
        playBeep('correct');
        const word = item.word;
        word.weight = 1; word.correctStreak = 3; word.status = 'mastered';
        word.lastResult = 'correct'; word.lastDate = new Date().toDateString();
        word.totalCorrect++; word.totalAttempts++;
        session.queue = session.queue.filter((q, i) => i <= session.currentIdx || q.word.id !== word.id);
        const stars = 1;
        session.wordStars[word.id] = stars;
        session.starsEarned += stars;
        session.wordResults[word.id] = 'correct';
        this.data.stats.totalStars += stars;
        this.data.stats.correctStreak = (this.data.stats.correctStreak || 0) + 1;
        this.data.stats.totalCorrect = (this.data.stats.totalCorrect || 0) + 1;
        Store.save(this.data);
        setTimeout(() => { session.currentIdx++; this.renderExercise(); }, 900);
      }
    } else {
      tileDom.classList.add('shake');
      setTimeout(() => tileDom.classList.remove('shake'), 450);
      document.getElementById('know-fb').innerHTML =
        '<span style="color:var(--danger);font-size:15px">Помилка! Продовжуємо звичайно…</span>';
      setTimeout(() => this.collectReveal(), 1200);
    }
  },

  collectClick(ti) {
    const { session } = this;
    const item = session.queue[session.currentIdx];
    const cs = item._cs;
    if (cs.selected.some(s => s.ti === ti)) return;
    const tile = cs.shuffled[ti];
    const nextPos = cs.selected.length;
    const expected = cs.original[nextPos].l;
    const tileDom = document.getElementById(`tile-${ti}`);
    const slotDom = document.getElementById(`slot-${nextPos}`);
    if (tile.l === expected) {
      tileDom.classList.add('used');
      slotDom.textContent = tile.l;
      slotDom.classList.add('filled');
      cs.selected.push({ ti });
      if (window.gsap) gsap.from(slotDom, { scale: 0, duration: 0.2, ease: 'back.out' });
      if (cs.selected.length === cs.original.length) {
        document.getElementById('collect-fb').innerHTML =
          '<span style="color:var(--secondary);font-size:20px;font-weight:800">✓ Чудово!</span>';
        playBeep('correct');
        setTimeout(() => this.advanceExercise(item, 'correct_first'), 700);
      }
    } else {
      tileDom.classList.add('shake');
      setTimeout(() => tileDom.classList.remove('shake'), 450);
      document.getElementById('collect-fb').innerHTML =
        '<span style="color:var(--danger);font-size:15px">Не та буква, спробуй іншу!</span>';
      setTimeout(() => {
        const fb = document.getElementById('collect-fb');
        if (fb) fb.innerHTML = '';
      }, 900);
    }
  },

  // ─── WRITE AFTER DISAPPEAR ───────────────
  tplWriteAfter(item) {
    if (!item._ws) {
      const original = item.word.text.split('').map((l, i) => ({ l, i }));
      const extras = Words.buildExtras(item.word.text);
      const allTiles = [...original.map(lt => ({ l: lt.l })), ...extras].sort(() => Math.random() - 0.5);
      item._ws = { original, shuffled: allTiles, selected: [], hadWrong: false };
    }
    setTimeout(() => App.writeAfterReveal(), 1000);

    return `
    <div id="write-wrap">
      <div class="text-center mb-2"><p style="font-size:16px">Запам'ятай слово:</p></div>
      <div class="word-display" id="word-shown">${this.escHtml(item.word.text)}</div>
    </div>`;
  },

  writeAfterReveal() {
    const wrap = document.getElementById('write-wrap');
    if (!wrap) return;
    const item = this.session?.queue[this.session.currentIdx];
    if (!item) return;
    const ws = item._ws;
    const slots = ws.original.map((_, i) => `<div class="answer-slot" id="wslot-${i}"></div>`).join('');
    const tiles = ws.shuffled.map((lt, ti) =>
      `<div class="letter-tile${ws.selected.some(s => s.ti === ti) ? ' used' : ''}" id="wtile-${ti}" onclick="App.writeAfterClick(${ti})">${lt.l}</div>`
    ).join('');
    wrap.innerHTML = `
      <div class="text-center mb-2"><p style="font-size:16px">Склади слово з пам'яті:</p></div>
      <div class="answer-slots" id="write-answer-slots">${slots}</div>
      <div class="letters-pool">${tiles}</div>
      <div class="feedback-area" id="write-fb"></div>`;
  },

  writeAfterClick(ti) {
    const { session } = this;
    const item = session.queue[session.currentIdx];
    const ws = item._ws;
    if (ws.selected.some(s => s.ti === ti)) return;
    const tile = ws.shuffled[ti];
    const nextPos = ws.selected.length;
    const expected = ws.original[nextPos].l;
    const tileDom = document.getElementById(`wtile-${ti}`);
    const slotDom = document.getElementById(`wslot-${nextPos}`);
    if (tile.l === expected) {
      tileDom.classList.add('used');
      slotDom.textContent = tile.l;
      slotDom.classList.add('filled');
      ws.selected.push({ ti });
      if (window.gsap) gsap.from(slotDom, { scale: 0, duration: 0.2, ease: 'back.out' });
      if (ws.selected.length === ws.original.length) {
        document.getElementById('write-fb').innerHTML =
          '<span style="color:var(--secondary);font-size:20px;font-weight:800">✓ Чудово!</span>';
        playBeep('correct');
        setTimeout(() => this.advanceExercise(item, ws.hadWrong ? 'correct_retry' : 'correct_first'), 700);
      }
    } else {
      ws.hadWrong = true;
      tileDom.classList.add('shake');
      setTimeout(() => tileDom.classList.remove('shake'), 450);
      document.getElementById('write-fb').innerHTML =
        '<span style="color:var(--danger);font-size:15px">Не та буква, спробуй іншу!</span>';
      setTimeout(() => { const fb = document.getElementById('write-fb'); if (fb) fb.innerHTML = ''; }, 900);
    }
  },

  checkCorrection(mode) {
    const { session } = this;
    const item = session.queue[session.currentIdx];
    const id = mode === 'write' ? 'correction-inp' : 'correction-inp-d';
    const inp = document.getElementById(id);
    if (!inp) return;
    const answer = inp.value.trim();
    const correct = item.word.text;
    if (answer !== correct) {
      inp.classList.add('shake');
      setTimeout(() => inp.classList.remove('shake'), 450);
      return;
    }
    inp.classList.add('correct');
    inp.disabled = true;
    setTimeout(() => this.advanceExercise(item, 'wrong'), 600);
  },

  // ─── DICTATION ───────────────────────────
  tplDictation(item) {
    if (!item._ds) {
      const original = item.word.text.split('').map((l, i) => ({ l, i }));
      const extras = Words.buildExtras(item.word.text);
      const allTiles = [...original.map(lt => ({ l: lt.l })), ...extras].sort(() => Math.random() - 0.5);
      item._ds = { original, shuffled: allTiles, selected: [], hadWrong: false };
    }
    setTimeout(() => TTS.speak(item.word.text), 250);
    const ds = item._ds;
    const slots = ds.original.map((_, i) => `<div class="answer-slot" id="dslot-${i}"></div>`).join('');
    const tiles = ds.shuffled.map((lt, ti) =>
      `<div class="letter-tile${ds.selected.some(s => s.ti === ti) ? ' used' : ''}" id="dtile-${ti}" onclick="App.dictationClick(${ti})">${lt.l}</div>`
    ).join('');
    return `
    <div class="text-center">
      <p style="font-size:16px;margin-bottom:14px">Послухай і склади слово:</p>
      <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px">
        <button class="sound-btn" onclick="App.speakCurrent()">🔊</button>
        <span style="font-size:14px;color:var(--text-light)">Натисни для повторення</span>
      </div>
      <div class="answer-slots" id="dict-answer-slots">${slots}</div>
      <div class="letters-pool">${tiles}</div>
      <div class="feedback-area" id="dict-fb"></div>
    </div>`;
  },

  speakCurrent() {
    const item = this.session?.queue[this.session.currentIdx];
    if (item) TTS.speak(item.word.text);
  },

  dictationClick(ti) {
    const { session } = this;
    const item = session.queue[session.currentIdx];
    const ds = item._ds;
    if (ds.selected.some(s => s.ti === ti)) return;
    const tile = ds.shuffled[ti];
    const nextPos = ds.selected.length;
    const expected = ds.original[nextPos].l;
    const tileDom = document.getElementById(`dtile-${ti}`);
    const slotDom = document.getElementById(`dslot-${nextPos}`);
    if (tile.l === expected) {
      tileDom.classList.add('used');
      slotDom.textContent = tile.l;
      slotDom.classList.add('filled');
      ds.selected.push({ ti });
      if (window.gsap) gsap.from(slotDom, { scale: 0, duration: 0.2, ease: 'back.out' });
      if (ds.selected.length === ds.original.length) {
        document.getElementById('dict-fb').innerHTML =
          '<span style="color:var(--secondary);font-size:20px;font-weight:800">✓ Чудово!</span>';
        playBeep('correct');
        setTimeout(() => this.advanceExercise(item, ds.hadWrong ? 'correct_retry' : 'correct_first'), 700);
      }
    } else {
      ds.hadWrong = true;
      tileDom.classList.add('shake');
      setTimeout(() => tileDom.classList.remove('shake'), 450);
      document.getElementById('dict-fb').innerHTML =
        '<span style="color:var(--danger);font-size:15px">Не та буква, спробуй іншу!</span>';
      setTimeout(() => { const fb = document.getElementById('dict-fb'); if (fb) fb.innerHTML = ''; }, 900);
    }
  },

  // ─── HINTS ───────────────────────────────
  showHint() {
    const { session } = this;
    if (session.hintsUsed >= 3) return;
    const item = session.queue[session.currentIdx];
    session.hintsUsed++;
    item.hintPenalty += 0.5;
    const lbl = document.getElementById('hint-count-lbl');
    if (lbl) lbl.textContent = `💡 Підказок залишилось: ${3 - session.hintsUsed}`;
    const hb = document.getElementById('hint-btn');
    if (hb && session.hintsUsed >= 3) hb.disabled = true;

    if (item.type === 'collect') {
      const cs = item._cs;
      const nextPos = cs.selected.length;
      const expected = cs.original[nextPos]?.l;
      const ti = cs.shuffled.findIndex((t, i) =>
        t.l === expected && !cs.selected.some(s => s.ti === i));
      if (ti >= 0) {
        const tile = document.getElementById(`tile-${ti}`);
        if (tile) {
          tile.classList.add('hint-glow');
          setTimeout(() => tile.classList.remove('hint-glow'), 2000);
        }
      }
    } else if (item.type === 'write_after') {
      const ws = item._ws;
      const nextPos = ws.selected.length;
      const expected = ws.original[nextPos]?.l;
      const ti = ws.shuffled.findIndex((t, i) =>
        t.l === expected && !ws.selected.some(s => s.ti === i));
      if (ti >= 0) {
        const tile = document.getElementById(`wtile-${ti}`);
        if (tile) { tile.classList.add('hint-glow'); setTimeout(() => tile.classList.remove('hint-glow'), 2000); }
      }
    } else if (item.type === 'dictation') {
      const ds = item._ds;
      const nextPos = ds.selected.length;
      const expected = ds.original[nextPos]?.l;
      const ti = ds.shuffled.findIndex((t, i) =>
        t.l === expected && !ds.selected.some(s => s.ti === i));
      if (ti >= 0) {
        const tile = document.getElementById(`dtile-${ti}`);
        if (tile) { tile.classList.add('hint-glow'); setTimeout(() => tile.classList.remove('hint-glow'), 2000); }
      }
    }
  },

  // ─── ADVANCE EXERCISE ────────────────────
  advanceExercise(item, result) {
    const { session } = this;
    item.attempts++;
    if (result !== 'correct_first') session.wordErrors[item.word.id] = true;
    const wordExercises = session.queue.filter(q => q.word.id === item.word.id);
    const isLast = wordExercises.indexOf(item) === wordExercises.length - 1;
    if (isLast) {
      Words.updateWeight(item.word, result);
      let stars = result === 'correct_first' ? 1 : result === 'correct_retry' ? 0.5 : 0;
      const totalPenalty = wordExercises.reduce((s, e) => s + e.hintPenalty, 0);
      stars = Math.max(0, stars - totalPenalty);
      session.wordStars[item.word.id] = (session.wordStars[item.word.id] || 0) + stars;
      session.starsEarned += stars;
      session.wordResults[item.word.id] = result === 'wrong' ? 'wrong' : 'correct';
      this.data.stats.totalStars += stars;
      if (result !== 'wrong') {
        this.data.stats.correctStreak = (this.data.stats.correctStreak || 0) + 1;
        this.data.stats.totalCorrect = (this.data.stats.totalCorrect || 0) + 1;
      } else {
        this.data.stats.correctStreak = 0;
      }
    }
    session.currentIdx++;
    Store.save(this.data);
    this.renderExercise();
  },

  // ─── FINISH SESSION ──────────────────────
  finishSession() {
    const { session } = this;
    const today = new Date().toDateString();
    const last = this.data.stats.lastSessionDate;
    if (last !== today) {
      const diff = last ? Math.floor((new Date() - new Date(last)) / 86400000) : 999;
      this.data.stats.streakDays = diff <= 1 ? (this.data.stats.streakDays || 0) + 1 : 1;
    }
    this.data.stats.lastSessionDate = today;
    this.data.stats.sessions = this.data.stats.sessions || [];
    this.data.stats.sessions.push({
      date: today,
      words: session.words.length,
      stars: session.starsEarned,
      duration: Math.round((Date.now() - session.startTime) / 1000),
      correct: Object.values(session.wordResults).filter(r => r === 'correct').length,
      perfect: session.words.filter(w => !session.wordErrors[w.id]).length,
    });
    session.newBadges = Rewards.checkBadges(this.data);
    Store.save(this.data);
    this.render('session_complete', { session });
  },

  // ─── SESSION COMPLETE ────────────────────
  tplSessionComplete({ session }) {
    const stars = session.starsEarned;

    const nextLv = LEVELS[lvIdx + 1] || null;
    const lvPct = nextLv
      ? Math.min(100, Math.round((totalStars - lv.min) / (nextLv.min - lv.min) * 100))
      : 100;
    const starsToNext = nextLv ? Math.ceil(nextLv.min - totalStars) : 0;
    const wordRows = session.words.map(w => {

    return `
    <div class="card">
      <div class="text-center">
        <h2>🎉 Тренування завершено!</h2>
        <div style="font-size:52px;font-weight:900;color:var(--primary);line-height:1.1">+${stars.toFixed(1)} ⭐</div>
        <div style="font-size:15px;color:var(--text-light);margin-bottom:12px">зірочок за сесію · Правильно: ${correct} з ${total}</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px">
          <span class="level-badge">${lv.icon} ${lv.name}</span>
          ${nextLv ? `<span style="color:var(--text-light);font-size:13px">→</span><span style="font-size:13px;color:var(--text-light)">${nextLv.icon} ${nextLv.name}</span>` : ''}
        </div>
        <div class="progress-bar-wrap" style="margin:0 0 6px">
          <div class="progress-bar-fill" style="width:${lvPct}%"></div>
        </div>
        <div style="font-size:12px;color:var(--text-light)">
          ${nextLv ? `До рівня «${nextLv.name}»: ще ${starsToNext} ⭐ · Всього: ${totalStars.toFixed(1)}` : '🏆 Максимальний рівень!'}
        </div>
      </div>
      ${badgeRows ? `<div class="mt-3"><h3>🏆 Нові нагороди!</h3>${badgeRows}</div>` : ''}
      <div class="mt-3"><h3>Результати:</h3><div style="max-height:280px;overflow-y:auto">${wordRows}</div></div>
      <button class="btn btn-primary w-full mt-3" onclick="App.render('home')">🏠 На головну</button>
      <button class="btn btn-ghost w-full mt-1" onclick="App.startSession()">🔁 Ще раз</button>
    </div>`;
  },

  // ─── STATS ───────────────────────────────
  tplStats() {
    const { totalStars, streakDays, correctStreak, sessions } = this.data.stats;
    const lv = Rewards.getLevel(totalStars);
    const mastered = this.data.words.filter(w => w.status === 'mastered').length;
    const hard = this.data.words.filter(w => w.weight >= 5).length;
    const learning = this.data.words.length - mastered;
    const today = new Date();
    const last7 = Array.from({length:7}, (_,i) => {
      const d = new Date(today); d.setDate(d.getDate() - (6-i));
      return d.toDateString();
    });
    const dayData = last7.map(day => ({
      lbl: new Date(day).toLocaleDateString('uk',{weekday:'short'}).slice(0,2),
      stars: (sessions||[]).filter(s => s.date === day).reduce((a,s) => a + s.stars, 0)
    }));
    const maxS = Math.max(...dayData.map(d => d.stars), 1);
    const chartHtml = `<div class="chart-bars">${dayData.map(d => `
      <div class="chart-bar-col">
        <div class="chart-val">${d.stars > 0 ? d.stars.toFixed(1).replace(/\.0$/,'') : ''}</div>
        <div class="chart-bar" style="height:${Math.max(3, Math.round(d.stars/maxS*90))}px"></div>
        <div class="chart-lbl">${d.lbl}</div>
      </div>`).join('')}</div>`;
    const wordRows = [...this.data.words].sort((a,b) => b.weight - a.weight).map(w => {
      const icon = w.status === 'mastered' ? '✅' : w.weight >= 5 ? '❌' : '🔄';
      return `<div class="word-list-item">
        <span class="word-status">${icon}</span>
        <span class="word-name">${this.escHtml(w.text)}</span>
        <span class="word-meta">вага:${w.weight} ✓${w.totalCorrect||0}</span>
      </div>`;
    }).join('');
    const badgeRows = this.data.badges.map(bid => {
      const d = BADGE_DEFS.find(b => b.id === bid);
      return d ? `<div class="badge"><span class="badge-icon">${d.icon}</span><div><div class="badge-name">${d.name}</div><div class="badge-desc">${d.desc}</div></div></div>` : '';
    }).join('');
    return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <button class="btn btn-ghost btn-sm" onclick="App.render('home')">← Назад</button>
        <h2 style="margin:0">📊 Статистика</h2>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-icon">⭐</div><div class="stat-value">${totalStars.toFixed(0)}</div><div class="stat-label">Зірочки</div></div>
        <div class="stat-box"><div class="stat-icon">🔥</div><div class="stat-value">${streakDays}</div><div class="stat-label">Серія днів</div></div>
        <div class="stat-box"><div class="stat-icon">${lv.icon}</div><div class="stat-value" style="font-size:13px">${lv.name}</div><div class="stat-label">Рівень</div></div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-icon">✅</div><div class="stat-value">${mastered}</div><div class="stat-label">Засвоєно</div></div>
        <div class="stat-box"><div class="stat-icon">🔄</div><div class="stat-value">${learning}</div><div class="stat-label">Вивчається</div></div>
        <div class="stat-box"><div class="stat-icon">❌</div><div class="stat-value">${hard}</div><div class="stat-label">Складні</div></div>
      </div>
      <h3>Зірочки за тиждень</h3>
      ${chartHtml}
      <h3 class="mt-2">Слова (${this.data.words.length})</h3>
      <div style="max-height:280px;overflow-y:auto">${wordRows || '<p>Немає слів</p>'}</div>
      ${badgeRows ? `<h3 class="mt-2">🏆 Мої нагороди</h3>${badgeRows}` : ''}
    </div>`;
  },

  tplAdminPin() {
    return `
    <div class="card text-center">
      <button class="btn btn-ghost btn-sm" onclick="App.render('home')" style="float:left">← Назад</button>
      <h2 style="padding-top:4px">⚙️ Налаштування</h2>
      <p>Введіть PIN-код</p>
      <div class="pin-display">${[0,1,2,3].map(i => `<div class="pin-dot" id="pd-${i}"></div>`).join('')}</div>
      <div id="pin-err" style="color:var(--danger);min-height:22px;font-size:14px;margin-bottom:8px"></div>
      <div class="pin-keypad">
        ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k =>
          k === '' ? '<div></div>' : `<div class="pin-key" onclick="App.pinPress('${k}')">${k}</div>`
        ).join('')}
      </div>
    </div>`;

  pinPress(key) {
    if (key === '⌫') {
      this._pin = this._pin.slice(0, -1);
    } else {
      if (this._pin.length >= 4) return;
      this._pin += key;
    }
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById(`pd-${i}`);
      if (d) d.classList.toggle('filled', i < this._pin.length);
    }
    if (this._pin.length === 4) {
      if (this._pin === (this.data.settings.pin || '1234')) {
        this._pin = '';
        this.render('admin');
      } else {
        document.getElementById('pin-err').textContent = '❌ Невірний PIN';
        this._pin = '';
        setTimeout(() => {
          const e = document.getElementById('pin-err'); if (e) e.textContent = '';
          for (let i = 0; i < 4; i++) { const d = document.getElementById(`pd-${i}`); if (d) d.classList.remove('filled'); }
        }, 1000);
      }
    }
  },

    sel.innerHTML = '<option value="">— Стандартний голос —</option>' +

  addWords() {
    const ta = document.getElementById('new-words-ta');
    if (!ta) return;
    const groupNameEl = document.getElementById('new-words-group');
    const groupName = groupNameEl ? groupNameEl.value.trim() : '';
    let groupId = null;
    if (groupName) {
      const existing = this.data.groups.find(g => g.name.toLowerCase() === groupName.toLowerCase());
      if (existing) {
        groupId = existing.id;
      } else {
        groupId = Date.now() + '_' + Math.random().toString(36).slice(2);
        this.data.groups.push({ id: groupId, name: groupName, createdAt: Date.now() });
      }
    }
    const existingWords = new Set(this.data.words.map(w => w.text.toLowerCase()));
    const lines = ta.value.split('\n').map(l => l.trim()).filter(Boolean);
    let added = 0;
    for (const t of lines) {
      if (!existingWords.has(t.toLowerCase())) {
        const w = Words.create(t);
        w.groupId = groupId;
        this.data.words.push(w);
        existingWords.add(t.toLowerCase());
        added++;
      }
    }
    Store.save(this.data);
    ta.value = '';
    if (groupNameEl) groupNameEl.value = '';
    alert(`Додано ${added} слів!`);
    this.render('admin');
  },

  editWord(idx) {
    const w = this.data.words[idx];
    const t = prompt('Редагувати слово:', w.text);
    if (t && t.trim()) { w.text = t.trim(); Store.save(this.data); this.render('admin'); }
  },

  deleteWord(idx) {
    if (confirm(`Видалити "${this.data.words[idx].text}"?`)) {
      this.data.words.splice(idx, 1);
      Store.save(this.data);
      this.render('admin');
    }
  },

  clearWords() {
    if (confirm('Видалити всі слова?')) { this.data.words = []; Store.save(this.data); this.render('admin'); }
  },

  resetProgress() {
    if (!confirm('Скинути весь прогрес? Слова залишаться.')) return;
    const d = Store.defaults();
    this.data.stats = d.stats;
    this.data.badges = [];
    this.data.words.forEach(w => {
      w.weight = 3; w.status = 'new'; w.correctStreak = 0;
      w.totalCorrect = 0; w.totalAttempts = 0; w.lastDate = null; w.lastResult = null;
    });
    Store.save(this.data);
    this.render('admin');
  },

  // ─── PARENT PANEL ────────────────────────
  showParentPanel() {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.id = 'parent-ol';
    overlay.innerHTML = `
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="margin:0">📊 Панель батьків</h2>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('parent-ol').remove()">✕</button>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="App.parentTab('today',this)">Сьогодні</div>
        <div class="tab" onclick="App.parentTab('week',this)">Тиждень</div>
        <div class="tab" onclick="App.parentTab('month',this)">Місяць</div>
      </div>
      <div id="parent-content">${this.tplParentTab('today')}</div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  },

  parentTab(period, el) {
    document.querySelectorAll('#parent-ol .tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('parent-content').innerHTML = this.tplParentTab(period);
  },

  tplParentTab(period) {
    const today = new Date();
    const sessions = this.data.stats.sessions || [];
    let filtered;
    if (period === 'today') {
      filtered = sessions.filter(s => s.date === today.toDateString());
    } else if (period === 'week') {
      const wk = new Date(today); wk.setDate(wk.getDate() - 7);
      filtered = sessions.filter(s => new Date(s.date) >= wk);
    } else {
      const mo = new Date(today); mo.setDate(mo.getDate() - 30);
      filtered = sessions.filter(s => new Date(s.date) >= mo);
    }
    if (!filtered.length) return '<p style="text-align:center;padding:24px">Немає даних за цей період</p>';
    const tw = filtered.reduce((a,s) => a+s.words, 0);
    const ts = filtered.reduce((a,s) => a+s.stars, 0);
    const tt = filtered.reduce((a,s) => a+(s.duration||0), 0);
    const tc = filtered.reduce((a,s) => a+(s.correct||0), 0);
    const tp = filtered.reduce((a,s) => a+(s.perfect||0), 0);
    const activeDays = new Set(filtered.map(s => s.date)).size;

    // Build chart data
    let chartData;
    if (period === 'today') {
      chartData = filtered.map((s, i) => ({
        lbl: `#${i+1}`,
        stars: s.stars,
        title: `${s.words} сл, ${this.fmtTime(s.duration||0)}`
      }));
    } else if (period === 'week') {
      chartData = Array.from({length:7}, (_,i) => {
        const d = new Date(today); d.setDate(d.getDate() - (6-i));
        const day = d.toDateString();
        const daySessions = filtered.filter(s => s.date === day);
        return {
          lbl: d.toLocaleDateString('uk',{weekday:'short'}).slice(0,2),
          stars: daySessions.reduce((a,s) => a+s.stars, 0),
          active: daySessions.length > 0
        };
      });
    } else {
      chartData = Array.from({length:4}, (_,i) => {
        const wEnd = new Date(today); wEnd.setDate(wEnd.getDate() - i*7);
        const wStart = new Date(wEnd); wStart.setDate(wStart.getDate() - 6);
        const weekSessions = filtered.filter(s => { const d = new Date(s.date); return d >= wStart && d <= wEnd; });
        return {
          lbl: `${wStart.getDate()}.${wStart.getMonth()+1}`,
          stars: weekSessions.reduce((a,s) => a+s.stars, 0),
          active: weekSessions.length > 0
        };
      }).reverse();
    }
    const maxS = Math.max(...chartData.map(d => d.stars), 1);
    const chartHtml = `
    <p style="font-size:13px;font-weight:700;margin:14px 0 4px">Активність (⭐ зірочки)</p>
    <div class="chart-bars">${chartData.map(d => `
      <div class="chart-bar-col">
        <div class="chart-val">${d.stars > 0 ? d.stars.toFixed(1).replace(/\.0$/,'') : ''}</div>
        <div class="chart-bar" style="height:${Math.max(3, Math.round(d.stars/maxS*80))}px;${d.active===false?'opacity:0.3':''}"></div>
        <div class="chart-lbl">${d.lbl}</div>
      </div>`).join('')}</div>`;

    const rows = [...filtered].reverse().slice(0,8).map(s => `
    <div class="word-list-item">
      <span style="font-size:12px;color:var(--text-light)">${s.date}</span>
      <span>${s.words} сл, ${this.fmtTime(s.duration||0)}</span>
      <span style="color:var(--accent)">⭐${s.stars.toFixed(1)}</span>
    </div>`).join('');
    return `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-icon">📅</div><div class="stat-value">${activeDays}</div><div class="stat-label">Активних днів</div></div>
      <div class="stat-box"><div class="stat-icon">⭐</div><div class="stat-value">${ts.toFixed(1)}</div><div class="stat-label">Зірочки</div></div>
      <div class="stat-box"><div class="stat-icon">⏱️</div><div class="stat-value">${this.fmtTime(tt)}</div><div class="stat-label">Час</div></div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-icon">📝</div><div class="stat-value">${tw}</div><div class="stat-label">Слів</div></div>
      <div class="stat-box"><div class="stat-icon">✅</div><div class="stat-value">${tc}</div><div class="stat-label">Правильно</div></div>
      <div class="stat-box"><div class="stat-icon">🎯</div><div class="stat-value">${tw ? Math.round(tp/tw*100) : 0}%</div><div class="stat-label">Точність</div></div>
    </div>
    ${chartHtml}
    <p style="font-size:13px;font-weight:700;margin:14px 0 4px">Заняття:</p>${rows}`;
  },

  // ─── HANDLERS ────────────────────────────
  attachHandlers(screen, params) {
    if (screen === 'session') {
      const item = this.session?.queue[this.session.currentIdx];

    }
    if (screen === 'session_complete') {
      burstStars(params.session?.starsEarned || 0);
    }
    if (screen === 'admin_pin') this._pin = '';
  },

  // ─── UTILS ───────────────────────────────
  fmtTime(sec) {
    sec = Math.round(sec || 0);
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    const mm = String(m).padStart(2, '0');
    const ss = String(s).padStart(2, '0');
    return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  },
  escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
};

App.init();
</script>
</body>
</html>
