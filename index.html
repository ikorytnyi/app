<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Німецька вимова</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3e;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 640px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .flag { font-size: 32px; }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }

  header p {
    font-size: 13px;
    color: #6b7280;
    margin-top: 2px;
  }

  /* Textarea */
  .textarea-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: #12141e;
    border: 1.5px solid #2a2d3e;
    border-radius: 12px;
    color: #e8eaf0;
    font-size: 17px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Georgia', serif;
  }

  textarea:focus { border-color: #4f6ef7; }
  textarea::placeholder { color: #3d4157; }

  .char-count {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 12px;
    color: #3d4157;
  }

  /* Highlight display */
  #highlight-box {
    display: none;
    background: #12141e;
    border: 1.5px solid #2a2d3e;
    border-radius: 12px;
    padding: 16px;
    font-size: 17px;
    line-height: 1.9;
    font-family: 'Georgia', serif;
    min-height: 80px;
    margin-bottom: 16px;
    word-wrap: break-word;
  }

  #highlight-box .word {
    display: inline;
    border-radius: 4px;
    padding: 1px 2px;
    transition: background 0.1s;
    cursor: pointer;
  }

  #highlight-box .word:hover {
    background: #2a2d3e;
  }

  #highlight-box .word.active {
    background: #4f6ef7;
    color: #fff;
    border-radius: 5px;
    padding: 2px 5px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 11px 20px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    justify-content: center;
    min-width: 100px;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-play  { background: #4f6ef7; color: #fff; }
  .btn-play:hover:not(:disabled)  { background: #3d5ce5; }

  .btn-pause { background: #f59e0b; color: #000; }
  .btn-pause:hover:not(:disabled) { background: #d97706; }

  .btn-stop  { background: #ef4444; color: #fff; }
  .btn-stop:hover:not(:disabled)  { background: #dc2626; }

  .btn-word  { background: #10b981; color: #fff; flex: none; }
  .btn-word:hover:not(:disabled)  { background: #059669; }

  /* Settings row */
  .settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .setting-group label {
    display: block;
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .setting-group select,
  .setting-group input[type=range] {
    width: 100%;
  }

  select {
    background: #12141e;
    border: 1.5px solid #2a2d3e;
    color: #e8eaf0;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: #4f6ef7; }

  .range-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #2a2d3e;
    border-radius: 4px;
    outline: none;
    flex: 1;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #4f6ef7;
    cursor: pointer;
  }

  .range-val {
    font-size: 13px;
    color: #9ca3af;
    min-width: 32px;
    text-align: right;
  }

  /* Single word panel */
  .word-panel {
    background: #12141e;
    border: 1.5px solid #2a2d3e;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .word-panel label {
    font-size: 12px;
    color: #6b7280;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 8px;
  }

  .word-input-row {
    display: flex;
    gap: 8px;
  }

  .word-input-row input {
    flex: 1;
    background: #0f1117;
    border: 1.5px solid #2a2d3e;
    border-radius: 8px;
    color: #e8eaf0;
    font-size: 16px;
    padding: 9px 12px;
    outline: none;
    font-family: 'Georgia', serif;
  }

  .word-input-row input:focus { border-color: #10b981; }

  .btn-sm {
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    background: #10b981;
    color: #fff;
  }

  .btn-sm:hover { background: #059669; }
  .btn-sm:active { transform: scale(0.97); }

  /* Status */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #6b7280;
    padding-top: 16px;
    border-top: 1px solid #1e2130;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3d4157;
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .dot.speaking { background: #10b981; animation: pulse 1s infinite; }
  .dot.paused   { background: #f59e0b; }
  .dot.error    { background: #ef4444; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* Repeat button */
  .repeat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .repeat-row label {
    font-size: 13px;
    color: #6b7280;
  }

  .repeat-toggle {
    display: flex;
    gap: 6px;
  }

  .rep-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1.5px solid #2a2d3e;
    background: transparent;
    color: #6b7280;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .rep-btn.active {
    border-color: #4f6ef7;
    color: #4f6ef7;
    background: rgba(79,110,247,0.1);
  }

  /* No voice warning */
  .warning {
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f59e0b;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>

<div class="card">
  <header>
    <span class="flag">🇩🇪</span>
    <div>
      <h1>Вимова німецькою</h1>
      <p>Web Speech API · офлайн · безкоштовно</p>
    </div>
  </header>

  <div class="warning" id="warning">
    ⚠️ Голос для німецької не знайдено. Переконайтесь, що у вашій ОС встановлено мовний пакет <strong>Deutsch (de-DE)</strong>.
  </div>

  <!-- Textarea (редагування) -->
  <div class="textarea-wrap" id="textarea-wrap">
    <textarea id="text-input" placeholder="Введіть або вставте текст німецькою…
Наприклад: Der Typ war kein Typ, das war Erik."></textarea>
    <span class="char-count" id="char-count">0</span>
  </div>

  <!-- Підсвічування під час читання -->
  <div id="highlight-box"></div>

  <!-- Швидке читання одного слова -->
  <div class="word-panel">
    <label>🔍 Перевірити одне слово</label>
    <div class="word-input-row">
      <input type="text" id="single-word" placeholder="напр. Verhältnis" />
      <button class="btn-sm" onclick="speakSingleWord()">▶ Читати</button>
    </div>
  </div>

  <!-- Налаштування -->
  <div class="settings">
    <div class="setting-group">
      <label>Голос</label>
      <select id="voice-select"></select>
    </div>
    <div class="setting-group">
      <label>Швидкість</label>
      <div class="range-wrap">
        <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="0.85">
        <span class="range-val" id="rate-val">0.85×</span>
      </div>
    </div>
    <div class="setting-group">
      <label>Висота тону</label>
      <div class="range-wrap">
        <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1.0">
        <span class="range-val" id="pitch-val">1.0</span>
      </div>
    </div>
    <div class="setting-group">
      <label>Гучність</label>
      <div class="range-wrap">
        <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
        <span class="range-val" id="volume-val">100%</span>
      </div>
    </div>
  </div>

  <!-- Повтор -->
  <div class="repeat-row">
    <label>Повтор:</label>
    <div class="repeat-toggle">
      <button class="rep-btn active" data-val="1" onclick="setRepeat(1,this)">1×</button>
      <button class="rep-btn" data-val="2" onclick="setRepeat(2,this)">2×</button>
      <button class="rep-btn" data-val="3" onclick="setRepeat(3,this)">3×</button>
    </div>
  </div>

  <!-- Кнопки керування -->
  <div class="controls">
    <button class="btn btn-play"  id="btn-play"  onclick="startSpeaking()">▶ Читати</button>
    <button class="btn btn-pause" id="btn-pause" onclick="togglePause()" disabled>⏸ Пауза</button>
    <button class="btn btn-stop"  id="btn-stop"  onclick="stopSpeaking()" disabled>⏹ Стоп</button>
  </div>

  <!-- Статус -->
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Готовий</span>
  </div>
</div>

<script>
const synth = window.speechSynthesis;
let voices = [];
let currentUtterance = null;
let isPaused = false;
let repeatCount = 1;
let currentRepeat = 0;
let words = [];
let wordSpans = [];

// ── Завантаження голосів ──────────────────────────────────────────
function loadVoices() {
  voices = synth.getVoices();
  const select = document.getElementById('voice-select');
  const deVoices = voices.filter(v => v.lang.startsWith('de'));

  if (deVoices.length === 0) {
    document.getElementById('warning').style.display = 'block';
    // fallback — показати всі
    voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.textContent = `${v.name} (${v.lang})`;
      select.appendChild(opt);
    });
    return;
  }

  select.innerHTML = '';
  deVoices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})${v.localService ? ' 📶' : ' ☁️'}`;
    select.appendChild(opt);
  });
}

if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = loadVoices;
}
loadVoices();
setTimeout(loadVoices, 500);

// ── Підготовка підсвічування ──────────────────────────────────────
function buildHighlight(text) {
  words = text.trim().split(/(\s+)/);
  const box = document.getElementById('highlight-box');
  box.innerHTML = '';
  wordSpans = [];

  words.forEach((token, i) => {
    if (/^\s+$/.test(token)) {
      box.appendChild(document.createTextNode(token));
    } else {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = token;
      span.title = 'Клік — прочитати це слово';
      span.addEventListener('click', () => speakWord(token));
      box.appendChild(span);
      wordSpans.push({ span, token, globalIndex: i });
    }
  });
}

function highlightWord(charIndex, charLength) {
  wordSpans.forEach(w => w.span.classList.remove('active'));
  let pos = 0;
  for (const w of wordSpans) {
    if (pos === charIndex || (pos <= charIndex && pos + w.token.length > charIndex)) {
      w.span.classList.add('active');
      w.span.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      break;
    }
    pos += w.token.length;
    // skip whitespace tokens
    const idx = wordSpans.indexOf(w);
    if (idx < wordSpans.length - 1) {
      const between = words.slice(
        words.indexOf(w.token, idx),
        words.indexOf(wordSpans[idx+1]?.token, idx)
      ).join('');
      pos += between.replace(w.token,'').length;
    }
  }
}

// ── Читання ───────────────────────────────────────────────────────
function getSelectedVoice() {
  const name = document.getElementById('voice-select').value;
  return voices.find(v => v.name === name) || voices.find(v => v.lang.startsWith('de')) || voices[0];
}

function createUtterance(text) {
  const utt = new SpeechSynthesisUtterance(text);
  utt.voice  = getSelectedVoice();
  utt.lang   = 'de-DE';
  utt.rate   = parseFloat(document.getElementById('rate').value);
  utt.pitch  = parseFloat(document.getElementById('pitch').value);
  utt.volume = parseFloat(document.getElementById('volume').value);

  utt.onboundary = e => {
    if (e.name === 'word') highlightWord(e.charIndex, e.charLength);
  };

  utt.onstart = () => setStatus('speaking', 'Читає…');
  utt.onpause = () => setStatus('paused', 'Пауза');
  utt.onresume = () => setStatus('speaking', 'Читає…');

  utt.onend = () => {
    currentRepeat++;
    if (currentRepeat < repeatCount) {
      setTimeout(() => synth.speak(createUtterance(text)), 400);
    } else {
      onDone();
    }
  };

  utt.onerror = e => {
    if (e.error !== 'interrupted') setStatus('error', `Помилка: ${e.error}`);
    else onDone();
  };

  return utt;
}

function startSpeaking() {
  const text = document.getElementById('text-input').value.trim();
  if (!text) return;

  stopSpeaking();
  currentRepeat = 0;

  // Показати highlight-box, сховати textarea
  buildHighlight(text);
  document.getElementById('textarea-wrap').style.display = 'none';
  document.getElementById('highlight-box').style.display = 'block';

  isPaused = false;
  currentUtterance = createUtterance(text);
  synth.speak(currentUtterance);

  document.getElementById('btn-play').disabled  = true;
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-stop').disabled  = false;
}

function togglePause() {
  if (!synth.speaking) return;
  if (isPaused) {
    synth.resume();
    isPaused = false;
    document.getElementById('btn-pause').textContent = '⏸ Пауза';
  } else {
    synth.pause();
    isPaused = true;
    document.getElementById('btn-pause').textContent = '▶ Продовжити';
  }
}

function stopSpeaking() {
  synth.cancel();
  isPaused = false;
  onDone();
}

function onDone() {
  wordSpans.forEach(w => w.span.classList.remove('active'));
  document.getElementById('btn-play').disabled  = false;
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('btn-stop').disabled  = true;
  document.getElementById('btn-pause').textContent = '⏸ Пауза';

  // Повернути textarea
  document.getElementById('textarea-wrap').style.display = 'block';
  document.getElementById('highlight-box').style.display = 'none';

  setStatus('idle', 'Готовий');
}

// ── Читання одного слова ──────────────────────────────────────────
function speakWord(word) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.voice  = getSelectedVoice();
  utt.lang   = 'de-DE';
  utt.rate   = parseFloat(document.getElementById('rate').value);
  utt.pitch  = parseFloat(document.getElementById('pitch').value);
  utt.volume = parseFloat(document.getElementById('volume').value);
  utt.onstart = () => setStatus('speaking', `Читає: «${word}»`);
  utt.onend   = () => setStatus('idle', 'Готовий');
  synth.speak(utt);
}

function speakSingleWord() {
  const w = document.getElementById('single-word').value.trim();
  if (w) speakWord(w);
}

document.getElementById('single-word').addEventListener('keydown', e => {
  if (e.key === 'Enter') speakSingleWord();
});

// ── Статус ────────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('dot');
  dot.className = 'dot';
  if (state === 'speaking') dot.classList.add('speaking');
  else if (state === 'paused') dot.classList.add('paused');
  else if (state === 'error') dot.classList.add('error');
  document.getElementById('status-text').textContent = text;
}

// ── Повтор ────────────────────────────────────────────────────────
function setRepeat(val, btn) {
  repeatCount = val;
  document.querySelectorAll('.rep-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Лічильник символів ────────────────────────────────────────────
const ta = document.getElementById('text-input');
ta.addEventListener('input', () => {
  document.getElementById('char-count').textContent = ta.value.length;
});

// ── Повзунки ─────────────────────────────────────────────────────
document.getElementById('rate').addEventListener('input', function() {
  document.getElementById('rate-val').textContent = parseFloat(this.value).toFixed(2) + '×';
});
document.getElementById('pitch').addEventListener('input', function() {
  document.getElementById('pitch-val').textContent = parseFloat(this.value).toFixed(1);
});
document.getElementById('volume').addEventListener('input', function() {
  document.getElementById('volume-val').textContent = Math.round(this.value * 100) + '%';
});

// ── Клавіатурні скорочення ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePause(); }
  if (e.code === 'Escape') stopSpeaking();
});

// ── Перевірка підтримки ───────────────────────────────────────────
if (!('speechSynthesis' in window)) {
  document.getElementById('status-text').textContent = '❌ Ваш браузер не підтримує Web Speech API. Використовуйте Chrome або Edge.';
  document.getElementById('dot').classList.add('error');
}
</script>
</body>
</html>
